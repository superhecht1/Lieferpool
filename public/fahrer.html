<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#0d1f15">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FrischKette · Fahrer-App</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1f15'/><text y='24' x='4' font-size='22' font-family='monospace' font-weight='bold' fill='%234a9e5c'>F</text></svg>">
  <style>
    :root {
      --green:   #2e7d3e;
      --green-l: #4a9e5c;
      --amber:   #c8912a;
      --forest:  #0d1f15;
      --bg:      #faf7f0;
      --bg2:     #ffffff;
      --border:  #dde0d8;
      --text:    #171d13;
      --text2:   #4a5244;
      --text3:   #8a9a84;
      --red:     #c62828;
      --radius:  10px;
    }

    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Figtree',Arial,sans-serif; font-size:16px; }

    /* ── APP SHELL ── */
    .app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; position:relative; background:var(--bg2); box-shadow:0 0 40px rgba(0,0,0,.08); }

    /* ── HEADER ── */
    .header {
      background:var(--forest); color:#fff;
      padding:1rem 1.25rem .875rem;
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0;
    }
    .header-logo { font-size:15px; font-weight:700; letter-spacing:-.01em; }
    .header-logo span { color:var(--amber); }
    .header-right { display:flex; align-items:center; gap:.75rem; }
    .track-badge {
      font-size:11px; padding:3px 8px; border-radius:20px;
      background:rgba(74,158,92,.2); color:#4a9e5c; border:1px solid rgba(74,158,92,.3);
      display:flex; align-items:center; gap:.35rem;
    }
    .track-badge.active { background:rgba(74,158,92,.3); color:#6fcf8c; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    .track-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }

    /* ── MAIN SCROLL AREA ── */
    .main { flex:1; overflow-y:auto; overflow-x:hidden; padding-bottom:80px; -webkit-overflow-scrolling:touch; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position:sticky; bottom:0;
      background:var(--forest);
      display:flex; border-top:1px solid rgba(255,255,255,.08);
      padding-bottom:env(safe-area-inset-bottom);
      flex-shrink:0;
    }
    .nav-tab {
      flex:1; display:flex; flex-direction:column; align-items:center;
      gap:.2rem; padding:.6rem .25rem; cursor:pointer;
      font-size:10px; color:rgba(255,255,255,.4); border:none; background:none;
      transition:color .2s; min-height:52px; justify-content:center;
    }
    .nav-tab.active { color:var(--amber); }
    .nav-tab .icon { font-size:20px; }

    /* ── SCREENS ── */
    .screen { padding:1.25rem; display:none; }
    .screen.active { display:block; }

    /* ── TODAY CARD ── */
    .today-card {
      background:linear-gradient(135deg, var(--forest) 0%, #1a3a25 100%);
      border-radius:var(--radius); padding:1.25rem; margin-bottom:1rem;
      color:#fff;
    }
    .today-label { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.45); margin-bottom:.3rem; }
    .today-date  { font-size:1.4rem; font-weight:600; margin-bottom:.75rem; }
    .today-stats { display:flex; gap:1.25rem; }
    .today-stat  { text-align:center; }
    .today-stat-val { font-size:1.6rem; font-weight:700; color:#fff; line-height:1; }
    .today-stat-lbl { font-size:10px; color:rgba(255,255,255,.45); text-transform:uppercase; letter-spacing:.06em; margin-top:.2rem; }

    /* ── TOUR CARD ── */
    .tour-card {
      border:1px solid var(--border); border-radius:var(--radius);
      margin-bottom:.875rem; overflow:hidden; background:var(--bg2);
    }
    .tour-card-head {
      padding:1rem 1.1rem .875rem; display:flex;
      justify-content:space-between; align-items:flex-start;
    }
    .tour-type-badge {
      font-size:11px; font-weight:600; text-transform:uppercase;
      letter-spacing:.06em; padding:3px 8px; border-radius:4px;
    }
    .badge-abholung    { background:#e8f5e9; color:#2e7d3e; }
    .badge-auslieferung{ background:#e3f2fd; color:#1565c0; }
    .badge-gemischt    { background:#fff3e0; color:#e65100; }
    .tour-name  { font-size:1rem; font-weight:600; margin:.35rem 0 .2rem; }
    .tour-meta  { font-size:12px; color:var(--text3); display:flex; flex-wrap:wrap; gap:.5rem; }
    .tour-meta-item { display:flex; align-items:center; gap:.25rem; }
    .progress-bar-wrap { height:5px; background:var(--border); }
    .progress-bar-fill { height:100%; background:var(--green-l); transition:width .5s; }
    .tour-card-footer {
      padding:.75rem 1.1rem; border-top:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .stopp-count { font-size:13px; color:var(--text2); }

    /* ── BIG BUTTONS ── */
    .btn-xl {
      width:100%; padding:1rem; border:none; border-radius:var(--radius);
      font-size:15px; font-weight:600; cursor:pointer; transition:all .15s;
      display:flex; align-items:center; justify-content:center; gap:.5rem;
      min-height:56px;
    }
    .btn-start  { background:var(--green); color:#fff; }
    .btn-start:hover { background:#1b5e20; }
    .btn-primary{ background:var(--amber); color:#fff; }
    .btn-primary:hover { background:#b87d1a; }
    .btn-outline { background:none; border:1.5px solid var(--border); color:var(--text2); }
    .btn-outline:hover { border-color:var(--text3); }
    .btn-danger { background:#ffebee; color:var(--red); border:1.5px solid #ffcdd2; }

    /* ── ACTIVE TOUR SCREEN ── */
    .progress-header {
      background:var(--forest); color:#fff; padding:1rem 1.25rem;
      display:flex; align-items:center; gap:.875rem;
    }
    .progress-circle {
      width:52px; height:52px; border-radius:50%;
      background:rgba(255,255,255,.1); border:3px solid var(--amber);
      display:flex; align-items:center; justify-content:center;
      font-size:15px; font-weight:700; flex-shrink:0;
    }
    .progress-info-title { font-size:14px; font-weight:600; margin-bottom:.15rem; }
    .progress-info-sub   { font-size:12px; color:rgba(255,255,255,.55); }

    /* ── STOPP CARD ── */
    .stopp-card {
      border:1px solid var(--border); border-radius:var(--radius);
      margin:0 1.25rem 1rem; overflow:hidden; background:var(--bg2);
    }
    .stopp-card.current { border-color:var(--amber); box-shadow:0 0 0 3px rgba(200,145,42,.12); }
    .stopp-card.done    { opacity:.65; }
    .stopp-head {
      padding:.875rem 1rem .75rem; display:flex;
      align-items:flex-start; gap:.875rem; cursor:pointer;
    }
    .stopp-num {
      width:30px; height:30px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; font-weight:700;
      background:var(--border); color:var(--text2);
    }
    .stopp-num.current { background:var(--amber); color:#fff; }
    .stopp-num.done    { background:var(--green); color:#fff; }
    .stopp-num.skipped { background:var(--text3); color:#fff; }
    .stopp-name  { font-size:.9rem; font-weight:600; margin-bottom:.2rem; }
    .stopp-addr  { font-size:12px; color:var(--text3); line-height:1.4; }
    .stopp-tags  { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.4rem; }
    .stopp-tag   { font-size:10px; padding:2px 7px; border-radius:3px; background:var(--bg); border:1px solid var(--border); color:var(--text2); }

    /* ── ACTION BUTTONS ── */
    .stopp-actions {
      padding:.75rem 1rem 1rem; border-top:1px solid var(--border);
      display:grid; gap:.5rem;
    }
    .stopp-actions-row { display:flex; gap:.5rem; }

    /* ── FOTO UPLOAD ── */
    .foto-area {
      background:var(--bg); border:2px dashed var(--border);
      border-radius:8px; padding:1rem; text-align:center;
      cursor:pointer; transition:border-color .2s; margin-bottom:.5rem;
    }
    .foto-area:hover { border-color:var(--green-l); }
    .foto-area.has-foto { border-style:solid; border-color:var(--green); }
    .foto-preview { width:100%; max-height:200px; object-fit:cover; border-radius:6px; display:none; }

    /* ── STOPP LIST (in tour overview) ── */
    .stopp-list-item {
      display:flex; align-items:center; gap:.75rem;
      padding:.75rem 1.25rem; border-bottom:1px solid var(--border);
    }
    .stopp-list-item:last-child { border-bottom:none; }
    .sli-num { font-size:12px; font-weight:700; width:24px; text-align:center; color:var(--text3); flex-shrink:0; }
    .sli-info { flex:1; min-width:0; }
    .sli-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sli-addr { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sli-status { font-size:11px; }

    /* ── MAPS BUTTON ── */
    .maps-btn {
      background:#e8f5e9; color:var(--green); border:1px solid #c8e6c9;
      border-radius:8px; padding:.6rem 1rem; font-size:13px; font-weight:600;
      cursor:pointer; display:flex; align-items:center; gap:.4rem; text-decoration:none;
      justify-content:center;
    }
    .maps-btn:hover { background:#c8e6c9; }

    /* ── STATUS BADGE ── */
    .sbadge { display:inline-flex; align-items:center; gap:.3rem; font-size:11px; font-weight:600; padding:3px 8px; border-radius:4px; }
    .sbadge-offen   { background:#f3f4f6; color:#6b7280; }
    .sbadge-aktiv   { background:#d1fae5; color:#065f46; }
    .sbadge-pause   { background:#fef3c7; color:#92400e; }
    .sbadge-done    { background:#d1fae5; color:#065f46; }
    .sbadge-skip    { background:#fee2e2; color:#991b1b; }

    /* ── HISTORY ── */
    .hist-card {
      border:1px solid var(--border); border-radius:var(--radius);
      padding:1rem 1.1rem; margin-bottom:.75rem; background:var(--bg2);
    }
    .hist-head { display:flex; justify-content:space-between; margin-bottom:.5rem; }
    .hist-name { font-size:.9rem; font-weight:600; }
    .hist-date { font-size:12px; color:var(--text3); }
    .hist-stats{ display:flex; gap:1rem; flex-wrap:wrap; }
    .hist-stat { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:.3rem; }

    /* ── EMPTY / LOADING ── */
    .empty { text-align:center; padding:3rem 1.5rem; color:var(--text3); }
    .empty-icon { font-size:2.5rem; margin-bottom:.75rem; opacity:.5; }
    .empty-title { font-size:1rem; font-weight:600; color:var(--text2); margin-bottom:.35rem; }
    .empty-sub   { font-size:13px; line-height:1.6; }
    .spinner2 { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; margin:2rem auto; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--forest); color:#fff; padding:.625rem 1.25rem; border-radius:20px;
      font-size:13px; opacity:0; transition:all .3s; z-index:999; white-space:nowrap;
      pointer-events:none;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── ALERT ── */
    .alert { border-radius:8px; padding:.75rem 1rem; font-size:13px; margin-bottom:.75rem; }
    .alert-err { background:#ffebee; color:var(--red); border:1px solid #ffcdd2; }
    .alert-ok  { background:#e8f5e9; color:var(--green); border:1px solid #c8e6c9; }

    /* ── SECTION HEADER ── */
    .sec-hdr { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--text3); padding:.875rem 1.25rem .4rem; font-weight:600; }

    /* ── FORM ── */
    .fld-label { font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); margin-bottom:.3rem; display:block; }
    .fld-input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:.65rem .875rem; font-size:14px; outline:none; background:var(--bg2); transition:border-color .2s; }
    .fld-input:focus { border-color:var(--amber); }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-logo">Frisch<span>Kette</span> · Fahrer</div>
    <div class="header-right">
      <div class="track-badge" id="track-badge">
        <div class="track-dot"></div>
        <span id="track-label">GPS aus</span>
      </div>
      <button onclick="Auth.logout()" style="background:none;border:none;color:rgba(255,255,255,.45);font-size:12px;cursor:pointer;padding:4px 6px;">Abmelden</button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main" id="main-content">

    <!-- SCREEN: HEUTE (Startseite) -->
    <div class="screen active" id="screen-heute">
      <div style="padding:1.25rem">
        <div id="today-card-wrap"></div>
        <div id="alert-wrap"></div>
        <div class="sec-hdr">Meine Touren heute</div>
      </div>
      <div id="touren-list-wrap"><div class="spinner2"></div></div>
    </div>

    <!-- SCREEN: AKTIVE TOUR -->
    <div class="screen" id="screen-tour">
      <div id="tour-progress-header"></div>
      <div id="tour-notiz-wrap"></div>
      <div id="tour-stopps-wrap"></div>
      <div style="padding:0 1.25rem 1rem">
        <button class="btn-xl btn-danger" id="btn-tour-beenden" onclick="tourBeenden()">⏹ Tour beenden</button>
      </div>
    </div>

    <!-- SCREEN: TOURHISTORIE -->
    <div class="screen" id="screen-hist">
      <div style="padding:1.25rem">
        <div style="font-weight:600;font-size:1rem;margin-bottom:1rem">Meine Touren</div>
        <div id="hist-wrap"><div class="spinner2"></div></div>
      </div>
    </div>

    <!-- SCREEN: PROFIL -->
    <div class="screen" id="screen-profil">
      <div style="padding:1.25rem">
        <div style="text-align:center;padding:1.5rem 0 1.25rem">
          <div style="width:64px;height:64px;border-radius:50%;background:var(--forest);color:#fff;font-size:1.5rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem" id="profil-avatar">?</div>
          <div style="font-size:1.1rem;font-weight:600" id="profil-name">—</div>
          <div style="font-size:12px;color:var(--text3)" id="profil-email">—</div>
        </div>

        <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1rem">
          <div style="padding:.875rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:13px;font-weight:500">GPS-Tracking</span>
            <span id="profil-gps-status" style="font-size:12px;color:var(--text3)">—</span>
          </div>
          <div style="padding:.875rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:13px;font-weight:500">Touren heute</span>
            <span id="profil-touren-heute" style="font-size:12px;color:var(--text3)">—</span>
          </div>
          <div style="padding:.875rem 1rem;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:13px;font-weight:500">App-Version</span>
            <span style="font-size:12px;color:var(--text3)">1.0.0</span>
          </div>
        </div>

        <div style="margin-bottom:.75rem">
          <label class="fld-label">Neues Passwort</label>
          <input class="fld-input" type="password" id="pw-neu" placeholder="Neues Passwort" style="margin-bottom:.5rem">
          <input class="fld-input" type="password" id="pw-wdh" placeholder="Wiederholen">
        </div>
        <button class="btn-xl btn-outline" style="margin-bottom:.75rem" onclick="passwortAendern()">🔑 Passwort ändern</button>
        <div id="pw-result"></div>
        <button class="btn-xl btn-danger" style="margin-top:.5rem" onclick="Auth.logout()">Abmelden</button>
      </div>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-tab active" id="tab-heute" onclick="showScreen('heute')">
      <span class="icon">🏠</span>Heute
    </button>
    <button class="nav-tab" id="tab-tour" onclick="showScreen('tour')" style="display:none">
      <span class="icon">🚲</span>Aktive Tour
    </button>
    <button class="nav-tab" id="tab-hist" onclick="showScreen('hist')">
      <span class="icon">📋</span>Verlauf
    </button>
    <button class="nav-tab" id="tab-profil" onclick="showScreen('profil')">
      <span class="icon">👤</span>Profil
    </button>
  </nav>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ── AUTH ──────────────────────────────────────────────── */
const Auth = {
  getToken() { return localStorage.getItem('fk_token') || sessionStorage.getItem('fk_token') || ''; },
  getUser() {
    try {
      const t = Auth.getToken();
      if (!t) return null;
      const parts = t.split('.');
      if (parts.length < 2) return null;
      const payload = parts[1].replace(/-/g,'+').replace(/_/g,'/');
      const padded  = payload + '='.repeat((4 - payload.length % 4) % 4);
      return JSON.parse(atob(padded));
    } catch { return null; }
  },
  logout() {
    localStorage.removeItem('fk_token');
    localStorage.removeItem('fk_refresh');
    sessionStorage.removeItem('fk_token');
    if (!window.location.pathname.includes('/login'))
      window.location.href = '/login';
  },
};

// Kein harter Redirect hier - lass loadTouren() den Fehler abfangen
const me = Auth.getUser();

/* ── API ───────────────────────────────────────────────── */
async function api(path, opts = {}) {
  try {
    const res = await fetch('/api' + path, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + Auth.getToken(),
        ...(opts.headers || {}),
      },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    if (res.status === 401 || res.status === 403) throw new Error('401: Nicht autorisiert');
    if (!res.ok) throw new Error(data.error || 'Server-Fehler');
    return data;
  } catch (err) {
    if (err.name === 'TypeError') throw new Error('Verbindungsfehler – Server nicht erreichbar');
    throw err;
  }
}

/* ── TOAST ─────────────────────────────────────────────── */
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = (ok ? '✓ ' : '⚠ ') + msg;
  el.className = 'show';
  setTimeout(() => el.className = '', 2500);
}

/* ── NAV ───────────────────────────────────────────────── */
let currentScreen = 'heute';

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  const tab = document.getElementById('tab-' + name);
  if (tab) tab.classList.add('active');
  currentScreen = name;

  if (name === 'hist')   loadHistorie();
  if (name === 'profil') loadProfil();
}

/* ── STATUS BADGE ──────────────────────────────────────── */
function badge(status) {
  const map = {
    offen:          ['sbadge-offen',  '○ Offen'],
    aktiv:          ['sbadge-aktiv',  '● Aktiv'],
    ausstehend:     ['sbadge-offen',  '○ Ausstehend'],
    abgeschlossen:  ['sbadge-done',   '✓ Erledigt'],
    uebersprungen:  ['sbadge-skip',   '⤷ Übersprungen'],
    unterwegs:      ['sbadge-aktiv',  '▶ Unterwegs'],
    abgebrochen:    ['sbadge-skip',   '✕ Abgebrochen'],
  };
  const [cls, lbl] = map[status] || ['sbadge-offen', status];
  return `<span class="sbadge ${cls}">${lbl}</span>`;
}

/* ── GPS TRACKING ──────────────────────────────────────── */
let trackingInterval = null;
let aktiveTourId     = null;

function startTracking(tourId) {
  aktiveTourId = tourId;
  if (!navigator.geolocation) return;
  sendPos();
  trackingInterval = setInterval(sendPos, 30000);
  updateTrackBadge(true);
}
function stopTracking() {
  if (trackingInterval) clearInterval(trackingInterval);
  trackingInterval = null;
  aktiveTourId     = null;
  updateTrackBadge(false);
}
async function sendPos() {
  if (!aktiveTourId) return;
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      await api('/tracking/position', { method:'POST', body:{
        tour_id: aktiveTourId,
        lat:     pos.coords.latitude,
        lon:     pos.coords.longitude,
        speed:   pos.coords.speed,
      }});
    } catch {}
  }, ()=>{}, { enableHighAccuracy:true, timeout:10000 });
}
function updateTrackBadge(on) {
  const b = document.getElementById('track-badge');
  const l = document.getElementById('track-label');
  if (!b || !l) return;
  b.className = 'track-badge' + (on ? ' active' : '');
  l.textContent = on ? 'GPS aktiv' : 'GPS aus';
}

// Send position on visibility change (Beacon API)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && aktiveTourId) sendPos();
});

/* ── TODAY CARD ────────────────────────────────────────── */
function renderTodayCard(touren) {
  const done  = touren.filter(t => t.status === 'abgeschlossen').length;
  const total = touren.length;
  const stoppsTotal = touren.reduce((a,t) => a + (parseInt(t.stopps_total)||0), 0);
  const stoppsDone  = touren.reduce((a,t) => a + (parseInt(t.stopps_erledigt)||0), 0);
  const now   = new Date();
  const datum = now.toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long' });

  document.getElementById('today-card-wrap').innerHTML = `
    <div class="today-card">
      <div class="today-label">Heute</div>
      <div class="today-date">${datum}</div>
      <div class="today-stats">
        <div class="today-stat">
          <div class="today-stat-val">${total}</div>
          <div class="today-stat-lbl">Touren</div>
        </div>
        <div class="today-stat">
          <div class="today-stat-val">${stoppsTotal}</div>
          <div class="today-stat-lbl">Stopps</div>
        </div>
        <div class="today-stat">
          <div class="today-stat-val">${stoppsDone}</div>
          <div class="today-stat-lbl">Erledigt</div>
        </div>
        <div class="today-stat">
          <div class="today-stat-val">${done}</div>
          <div class="today-stat-lbl">Abgeschl.</div>
        </div>
      </div>
    </div>`;
}

/* ── TOUREN LISTE ──────────────────────────────────────── */
let allTouren = [];

async function loadTouren() {
  try {
    const { touren } = await api('/touren/meine?datum=' + new Date().toISOString().slice(0,10));
    allTouren = touren || [];
    renderTodayCard(allTouren);

    if (!allTouren.length) {
      document.getElementById('touren-list-wrap').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🚲</div>
          <div class="empty-title">Keine Touren heute</div>
          <div class="empty-sub">Der Admin hat noch keine Tour für dich angelegt.</div>
        </div>`;
      return;
    }

    document.getElementById('touren-list-wrap').innerHTML =
      allTouren.map(t => tourCard(t)).join('');

    // Auto-open active tour
    const aktiv = allTouren.find(t => t.status === 'aktiv' || t.status === 'unterwegs');
    if (aktiv) {
      document.getElementById('tab-tour').style.display = 'flex';
    }
  } catch (err) {
    if (err.message.includes('401') || err.message.includes('Unauthor') || err.message.includes('Token')) {
      document.getElementById('touren-list-wrap').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🔒</div>
          <div class="empty-title">Nicht eingeloggt</div>
          <div class="empty-sub" style="margin-top:.5rem">
            <a href="/login" style="color:var(--amber);font-weight:600">→ Zur Anmeldung</a>
          </div>
        </div>`;
    } else {
      document.getElementById('touren-list-wrap').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠</div><div class="empty-title">${err.message}</div></div>`;
    }
  }
}

function tourCard(t) {
  const done  = parseInt(t.stopps_erledigt) || 0;
  const total = parseInt(t.stopps_total) || 0;
  const pct   = total > 0 ? Math.round(done/total*100) : 0;
  const typCls = t.typ === 'abholung' ? 'badge-abholung' : t.typ === 'auslieferung' ? 'badge-auslieferung' : 'badge-gemischt';
  const typLbl = t.typ === 'abholung' ? '🌾 Abholung' : t.typ === 'auslieferung' ? '🚚 Auslieferung' : '🔄 Gemischt';

  const isAktiv = t.status === 'aktiv' || t.status === 'unterwegs';
  const isOffen = t.status === 'offen';
  const isDone  = t.status === 'abgeschlossen';

  return `
    <div class="tour-card" id="tcard-${t.id}">
      <div class="tour-card-head">
        <div>
          <span class="tour-type-badge ${typCls}">${typLbl}</span>
          <div class="tour-name">${t.name || 'Tour ' + t.id.slice(0,6)}</div>
          <div class="tour-meta">
            <span class="tour-meta-item">🕐 ${t.startzeit ? t.startzeit.slice(0,5)+' Uhr' : 'Keine Zeit'}</span>
            <span class="tour-meta-item">📍 ${total} Stopps</span>
            ${t.fahrzeug_bezeichnung ? `<span class="tour-meta-item">🚲 ${t.fahrzeug_bezeichnung}</span>` : ''}
          </div>
        </div>
        ${badge(t.status)}
      </div>
      ${total > 0 ? `
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>` : ''}
      <div class="tour-card-footer">
        <span class="stopp-count">${done} von ${total} Stopps erledigt</span>
        ${isOffen ? `<button class="btn-xl btn-start" style="width:auto;padding:.6rem 1.25rem;font-size:13px" onclick="tourStarten('${t.id}')">▶ Tour starten</button>` : ''}
        ${isAktiv ? `<button class="btn-xl btn-primary" style="width:auto;padding:.6rem 1.25rem;font-size:13px" onclick="tourOeffnen('${t.id}')">▶ Weiter</button>` : ''}
        ${isDone  ? `<span style="font-size:12px;color:var(--green)">✓ Abgeschlossen</span>` : ''}
      </div>
    </div>`;
}

/* ── TOUR STARTEN ──────────────────────────────────────── */
async function tourStarten(id) {
  try {
    await api('/touren/' + id + '/status', { method:'PUT', body:{ status:'aktiv' } });
    toast('Tour gestartet');
    await tourOeffnen(id);
  } catch (err) { toast(err.message, false); }
}

/* ── TOUR ÖFFNEN ───────────────────────────────────────── */
let aktiveTour  = null;
let alleStopps  = [];
let currentStopp = null;

async function tourOeffnen(id) {
  try {
    const { tour, stopps } = await api('/touren/' + id + '?stopps=true');
    aktiveTour  = tour;
    alleStopps  = stopps || [];
    currentStopp = alleStopps.find(s => s.status === 'ausstehend') || null;

    document.getElementById('tab-tour').style.display = 'flex';
    renderAktiveTour();
    showScreen('tour');
    startTracking(id);
  } catch (err) { toast(err.message, false); }
}

/* ── AKTIVE TOUR RENDERN ───────────────────────────────── */
function renderAktiveTour() {
  const done  = alleStopps.filter(s => ['abgeschlossen','uebersprungen'].includes(s.status)).length;
  const total = alleStopps.length;
  const pct   = total > 0 ? Math.round(done/total*100) : 0;

  // Progress Header
  document.getElementById('tour-progress-header').innerHTML = `
    <div class="progress-header">
      <div class="progress-circle">${done}/${total}</div>
      <div style="flex:1">
        <div class="progress-info-title">${aktiveTour.name || 'Aktive Tour'}</div>
        <div class="progress-info-sub">${pct}% abgeschlossen · ${aktiveTour.startzeit?.slice(0,5)||''} Uhr</div>
        <div style="height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:.5rem">
          <div style="height:4px;background:var(--amber);border-radius:2px;width:${pct}%;transition:width .5s"></div>
        </div>
      </div>
    </div>`;

  // Notiz
  document.getElementById('tour-notiz-wrap').innerHTML = aktiveTour.notiz
    ? `<div style="margin:1rem 1.25rem 0;padding:.75rem 1rem;background:#fff8e1;border-radius:8px;border:1px solid #ffe082;font-size:13px;color:#5d4037">📝 ${aktiveTour.notiz}</div>`
    : '';

  // Stopps
  document.getElementById('tour-stopps-wrap').innerHTML =
    '<div class="sec-hdr">Stopps</div>' +
    alleStopps.map((s, i) => stoppCard(s, i)).join('');
}

/* ── STOPP CARD ────────────────────────────────────────── */
function stoppCard(s, i) {
  const isCurrent = s.status === 'ausstehend' && s.id === currentStopp?.id;
  const isDone    = s.status === 'abgeschlossen';
  const isSkip    = s.status === 'uebersprungen';

  const numCls = isDone ? 'done' : isSkip ? 'skipped' : isCurrent ? 'current' : '';
  const numTxt = isDone ? '✓' : isSkip ? '⤷' : (i+1);

  const mapsUrl = s.adresse
    ? `https://maps.google.com/?q=${encodeURIComponent(s.adresse + ', ' + (s.ort||''))}`
    : null;

  return `
    <div class="stopp-card ${isCurrent?'current':''} ${isDone?'done':''}" id="stopp-${s.id}">
      <div class="stopp-head">
        <div class="stopp-num ${numCls}">${numTxt}</div>
        <div style="flex:1;min-width:0">
          <div class="stopp-name">${s.name || s.erzeuger_name || s.caterer_name || 'Stopp ' + (i+1)}</div>
          <div class="stopp-addr">${[s.adresse, s.ort].filter(Boolean).join(', ') || '— Keine Adresse'}</div>
          <div class="stopp-tags">
            ${s.typ ? `<span class="stopp-tag">${s.typ === 'abholung' ? '🌾 Abholung' : '🚚 Lieferung'}</span>` : ''}
            ${s.menge ? `<span class="stopp-tag">${s.menge} kg</span>` : ''}
            ${s.produkt ? `<span class="stopp-tag">${s.produkt}</span>` : ''}
            ${s.lieferschein_nr ? `<span class="stopp-tag">📋 ${s.lieferschein_nr}</span>` : ''}
          </div>
        </div>
        ${badge(s.status)}
      </div>

      ${isCurrent ? `
      <div class="stopp-actions">

        ${mapsUrl ? `<a href="${mapsUrl}" target="_blank" class="maps-btn">🗺 Navigation starten</a>` : ''}

        ${s.notiz ? `<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:.6rem .875rem;font-size:12px;color:#5d4037">📝 ${s.notiz}</div>` : ''}

        <div>
          <label class="fld-label">Menge geliefert / abgeholt (kg)</label>
          <input class="fld-input" type="number" id="menge-${s.id}" placeholder="0" value="${s.menge||''}" inputmode="decimal" min="0" step="0.1">
        </div>

        <div>
          <label class="fld-label">Foto als Nachweis</label>
          <div class="foto-area" id="foto-area-${s.id}" onclick="document.getElementById('foto-inp-${s.id}').click()">
            <input type="file" accept="image/*" capture="environment" id="foto-inp-${s.id}" style="display:none" onchange="fotoPreview(this, '${s.id}')">
            <img id="foto-prev-${s.id}" class="foto-preview">
            <div id="foto-hint-${s.id}" style="color:var(--text3);font-size:13px">
              📷 Foto aufnehmen oder hochladen
            </div>
          </div>
        </div>

        <div>
          <label class="fld-label">Notiz (optional)</label>
          <input class="fld-input" type="text" id="notiz-${s.id}" placeholder="z.B. Schaden, Fehlmenge, Sonstiges">
        </div>

        <div class="stopp-actions-row">
          <button class="btn-xl btn-start" style="flex:2" onclick="stoppBestaetigen('${s.id}')">✓ Stopp bestätigen</button>
          <button class="btn-xl btn-danger" style="flex:1;font-size:13px" onclick="stoppUeberspringen('${s.id}')">⤷ Überspringen</button>
        </div>
      </div>` : ''}

      ${isDone && s.foto_base64 ? `
      <div style="padding:0 1rem .875rem">
        <img src="${s.foto_base64}" style="width:100%;max-height:150px;object-fit:cover;border-radius:6px;border:1px solid var(--border)">
      </div>` : ''}
    </div>`;
}

/* ── FOTO PREVIEW ──────────────────────────────────────── */
function fotoPreview(input, stoppId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img  = document.getElementById('foto-prev-' + stoppId);
    const hint = document.getElementById('foto-hint-' + stoppId);
    const area = document.getElementById('foto-area-' + stoppId);
    img.src = e.target.result;
    img.style.display = 'block';
    hint.style.display = 'none';
    area.classList.add('has-foto');
  };
  reader.readAsDataURL(file);
}

/* ── STOPP BESTÄTIGEN ──────────────────────────────────── */
async function stoppBestaetigen(stoppId) {
  const menge = document.getElementById('menge-' + stoppId)?.value;
  const notiz = document.getElementById('notiz-' + stoppId)?.value || '';
  const foto  = document.getElementById('foto-prev-' + stoppId)?.src || '';

  try {
    await api('/touren/' + aktiveTour.id + '/stopps/' + stoppId + '/bestaetigen', {
      method: 'POST',
      body: { menge_geliefert: menge ? parseFloat(menge) : null, notiz, foto: foto.startsWith('data:') ? foto : null },
    });
    toast('Stopp bestätigt ✓');

    // Nächsten Stopp finden
    const { tour, stopps } = await api('/touren/' + aktiveTour.id + '?stopps=true');
    aktiveTour  = tour;
    alleStopps  = stopps;
    currentStopp = stopps.find(s => s.status === 'ausstehend') || null;

    if (!currentStopp) {
      // Alle Stopps erledigt
      renderAktiveTour();
      document.getElementById('screen-tour').scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => {
        if (confirm('Alle Stopps erledigt! Tour jetzt abschließen?')) tourBeenden();
      }, 500);
    } else {
      renderAktiveTour();
      // Scroll zum nächsten Stopp
      setTimeout(() => {
        document.getElementById('stopp-' + currentStopp.id)?.scrollIntoView({ behavior:'smooth', block:'center' });
      }, 300);
    }
  } catch (err) { toast(err.message, false); }
}

/* ── STOPP ÜBERSPRINGEN ────────────────────────────────── */
async function stoppUeberspringen(stoppId) {
  const grund = prompt('Grund für Überspringen (optional):') ?? '';
  try {
    await api('/touren/' + aktiveTour.id + '/stopps/' + stoppId + '/ueberspringen', {
      method: 'POST', body: { grund },
    });
    toast('Stopp übersprungen');
    const { tour, stopps } = await api('/touren/' + aktiveTour.id + '?stopps=true');
    aktiveTour  = tour;
    alleStopps  = stopps;
    currentStopp = stopps.find(s => s.status === 'ausstehend') || null;
    renderAktiveTour();
  } catch (err) { toast(err.message, false); }
}

/* ── TOUR BEENDEN ──────────────────────────────────────── */
async function tourBeenden() {
  if (!confirm('Tour wirklich beenden?')) return;
  try {
    await api('/touren/' + aktiveTour.id + '/status', { method:'PUT', body:{ status:'abgeschlossen' } });
    stopTracking();
    toast('Tour abgeschlossen 🎉');
    document.getElementById('tab-tour').style.display = 'none';
    await loadTouren();
    showScreen('heute');
  } catch (err) { toast(err.message, false); }
}

/* ── TOURHISTORIE ──────────────────────────────────────── */
async function loadHistorie() {
  const wrap = document.getElementById('hist-wrap');
  wrap.innerHTML = '<div class="spinner2"></div>';
  try {
    const { touren } = await api('/touren/meine/alle?limit=30');
    if (!touren?.length) {
      wrap.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Noch keine Touren</div></div>`;
      return;
    }
    wrap.innerHTML = touren.map(t => {
      const done  = parseInt(t.stopps_erledigt) || 0;
      const total = parseInt(t.stopps_total) || 0;
      return `
        <div class="hist-card">
          <div class="hist-head">
            <div class="hist-name">${t.name || 'Tour'}</div>
            <div class="hist-date">${t.datum ? new Date(t.datum).toLocaleDateString('de-DE') : '—'}</div>
          </div>
          <div class="hist-stats">
            <span class="hist-stat">${badge(t.status)}</span>
            <span class="hist-stat">📍 ${done}/${total} Stopps</span>
            ${t.fahrzeug_bezeichnung ? `<span class="hist-stat">🚲 ${t.fahrzeug_bezeichnung}</span>` : ''}
            <span class="hist-stat">🕐 ${t.startzeit?.slice(0,5)||'—'}</span>
          </div>
        </div>`;
    }).join('');
  } catch (err) {
    wrap.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><div class="empty-title">${err.message}</div></div>`;
  }
}

/* ── PROFIL ────────────────────────────────────────────── */
function loadProfil() {
  const user = Auth.getUser();
  if (!user) return;
  const initials = (user.name || user.email || '?').charAt(0).toUpperCase();
  document.getElementById('profil-avatar').textContent  = initials;
  document.getElementById('profil-name').textContent    = user.name || '—';
  document.getElementById('profil-email').textContent   = user.email || '—';
  document.getElementById('profil-gps-status').textContent  = trackingInterval ? '● Aktiv' : '○ Aus';
  document.getElementById('profil-touren-heute').textContent = allTouren.length + ' Touren';
}

async function passwortAendern() {
  const pw1 = document.getElementById('pw-neu')?.value;
  const pw2 = document.getElementById('pw-wdh')?.value;
  const res = document.getElementById('pw-result');
  if (!pw1 || pw1 !== pw2) {
    res.innerHTML = '<div class="alert alert-err">Passwörter stimmen nicht überein</div>'; return;
  }
  if (pw1.length < 8) {
    res.innerHTML = '<div class="alert alert-err">Mindestens 8 Zeichen</div>'; return;
  }
  try {
    await api('/auth/change-password', { method:'POST', body:{ newPassword: pw1 } });
    res.innerHTML = '<div class="alert alert-ok">✓ Passwort geändert</div>';
    document.getElementById('pw-neu').value = '';
    document.getElementById('pw-wdh').value = '';
  } catch (err) {
    res.innerHTML = `<div class="alert alert-err">${err.message}</div>`;
  }
}

/* ── BACKEND ROUTE: /touren/meine ──────────────────────── */
// Falls die Route noch nicht existiert, gracefully leeren
async function apiSafe(path) {
  try { return await api(path); } catch { return {}; }
}

/* ── INIT ──────────────────────────────────────────────── */
loadTouren();
</script>
