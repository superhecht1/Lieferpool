<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LieferPool – Fahrer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Fahrer-spezifische Mobile-Styles */
    .fahrer-app { display:flex; flex-direction:column; min-height:100vh; }
    .fahrer-header {
      background:#0d1f15; color:#fff; padding:1rem 1.25rem;
      display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;
    }
    .fahrer-logo { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; }
    .fahrer-logo span { color:#7ab648; }
    .fahrer-user { font-size:12px; color:rgba(255,255,255,.6); }
    .fahrer-main { flex:1; padding:1rem; max-width:480px; margin:0 auto; width:100%; }

    .tour-card {
      background:#fff; border:1px solid var(--border); border-radius:10px;
      padding:1.25rem; margin-bottom:1rem; box-shadow:var(--shadow);
    }
    .tour-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:.75rem; }
    .tour-typ { font-size:13px; font-weight:600; color:var(--text); }
    .tour-meta { font-size:12px; color:var(--text3); font-family:'DM Mono',monospace; }

    .stopp-card {
      background:#fff; border:2px solid var(--border); border-radius:10px;
      padding:1.25rem; margin-bottom:.75rem; transition:border-color .15s;
    }
    .stopp-card.current  { border-color:var(--green); box-shadow:0 0 0 3px rgba(46,125,62,.1); }
    .stopp-card.done     { opacity:.55; border-color:#dde0d8; }
    .stopp-card.skipped  { opacity:.4; border-color:#dde0d8; }

    .stopp-nr {
      width:28px; height:28px; border-radius:50%; font-family:'DM Mono',monospace;
      font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center;
      background:var(--bg3); color:var(--text2); flex-shrink:0;
    }
    .stopp-nr.current { background:var(--green); color:#fff; }
    .stopp-nr.done    { background:#eaf4ec; color:var(--green); }

    .stopp-row { display:flex; align-items:flex-start; gap:.75rem; }
    .stopp-body { flex:1; }
    .stopp-name { font-size:14px; font-weight:600; color:var(--text); margin-bottom:2px; }
    .stopp-addr { font-size:12px; color:var(--text2); line-height:1.5; }
    .stopp-ware { font-size:12px; color:var(--text3); font-family:'DM Mono',monospace; margin-top:4px; }

    .stopp-actions { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.875rem; }

    .confirm-form {
      margin-top:.875rem; padding:.875rem; background:var(--bg); border-radius:6px;
      border:1px solid var(--border);
    }

    .fab {
      position:fixed; bottom:1.5rem; right:1.5rem;
      width:56px; height:56px; border-radius:50%;
      background:var(--green); color:#fff; border:none;
      font-size:24px; cursor:pointer; box-shadow:0 4px 16px rgba(46,125,62,.4);
      display:flex; align-items:center; justify-content:center;
      transition:all .2s;
    }
    .fab:hover { background:var(--green-dim); transform:scale(1.05); }

    .empty-state { text-align:center; padding:3rem 1rem; color:var(--text3); }
    .empty-icon  { font-size:3rem; margin-bottom:.75rem; }

    .progress-ring {
      display:flex; align-items:center; gap:.75rem;
      padding:.75rem 1rem; background:var(--green-bg);
      border:1px solid #b8dfc0; border-radius:6px; margin-bottom:1rem;
    }
    .ring-val { font-size:20px; font-weight:300; color:var(--green); font-family:'DM Mono',monospace; }
    .ring-lbl { font-size:11px; color:var(--text2); }
  </style>
</head>
<body>
<div class="fahrer-app">
  <header class="fahrer-header">
    <div class="fahrer-logo">Liefer<span>Pool</span> <span style="font-size:11px;opacity:.6">Fahrer</span></div>
    <div style="display:flex;align-items:center;gap:.75rem">
      <span class="fahrer-user" id="fahrer-name"></span>
      <button style="background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px" id="btn-logout">Abmelden</button>
    </div>
  </header>

  <div class="fahrer-main">
    <div id="alerts"></div>

    <!-- TOUR AUSWÄHLEN -->
    <div id="view-tours">
      <div style="margin-bottom:1rem">
        <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem">Meine Tour heute</div>
        <div id="tour-datum" style="font-size:22px;font-weight:300;color:var(--text)"></div>
      </div>
      <div id="tours-list"><div class="spinner"></div></div>
    </div>

    <!-- AKTIVE TOUR -->
    <div id="view-active-tour" style="display:none">
      <div id="tour-progress-bar"></div>
      <div id="tour-info-card" class="tour-card"></div>
      <div id="stopps-container"></div>
    </div>

    <!-- TOUR ABGESCHLOSSEN -->
    <div id="view-done" style="display:none">
      <div class="success-box" style="margin-top:1rem">
        <div class="success-icon">🎉</div>
        <div class="success-title">Tour abgeschlossen!</div>
        <div class="success-sub">Alle Stopps erledigt</div>
        <button class="btn btn-sm" style="margin-top:1rem" id="btn-back-tours">Zurück zur Übersicht</button>
      </div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
const user = requireAuth('fahrer');
if (!user) throw 'not auth';

document.getElementById('fahrer-name').textContent = user.name;
document.getElementById('btn-logout').addEventListener('click', () => {
  Auth.clear(); window.location.href = '/login';
});

let aktiveTour  = null;
let alleStopps  = [];

// Datum anzeigen
const heute = new Date();
document.getElementById('tour-datum').textContent =
  heute.toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long' });

document.getElementById('btn-back-tours').addEventListener('click', () => {
  document.getElementById('view-done').style.display         = 'none';
  document.getElementById('view-tours').style.display        = 'block';
  document.getElementById('view-active-tour').style.display  = 'none';
  loadTouren();
});

// ── TOUREN LADEN ──────────────────────────────────────────────
async function loadTouren() {
  try {
    // Nur Touren für diesen Fahrer heute
    const heute = new Date().toISOString().split('T')[0];
    const res = await fetch(`/api/touren?datum=${heute}`, {
      headers: { 'Authorization': 'Bearer ' + Auth.getToken() }
    });
    const data = await res.json();
    const touren = data.touren || [];

    const myTours = touren.filter(t => t.fahrer_id || true); // alle sehen für jetzt

    const container = document.getElementById('tours-list');
    if (!myTours.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div style="font-size:14px;font-weight:500">Keine Touren heute</div>
          <div style="font-size:13px;margin-top:.25rem">Schau später nochmal vorbei</div>
        </div>`;
      return;
    }

    container.innerHTML = myTours.map(t => `
      <div class="tour-card" style="cursor:pointer" data-tour-id="${t.id}">
        <div class="tour-header">
          <div>
            <div class="tour-typ">${t.typ === 'abholung' ? '🌾 Abholung' : t.typ === 'auslieferung' ? '🚚 Auslieferung' : '🔄 Gemischt'}</div>
            <div class="tour-meta">${t.startzeit ? t.startzeit.slice(0,5) + ' Uhr' : 'Flexibel'} · ${t.stopp_anzahl || 0} Stopps</div>
          </div>
          ${statusBadge(t.status)}
        </div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          ${t.fahrzeug_bezeichnung ? `<span class="badge badge-gray">🚗 ${t.fahrzeug_bezeichnung}</span>` : ''}
          <span class="badge badge-gray">${t.stopps_done || 0}/${t.stopp_anzahl || 0} erledigt</span>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:.875rem" data-action="start-tour" data-id="${t.id}">
          ${t.status === 'gestartet' ? '▶ Weiter' : '▶ Tour starten'}
        </button>
      </div>
    `).join('');

    container.addEventListener('click', e => {
      const btn = e.target.closest('[data-action="start-tour"]');
      if (btn) openTour(btn.dataset.id);
    });
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

// ── TOUR ÖFFNEN ───────────────────────────────────────────────
async function openTour(tourId) {
  try {
    const res = await fetch(`/api/touren/${tourId}`, {
      headers: { 'Authorization': 'Bearer ' + Auth.getToken() }
    });
    const data = await res.json();
    aktiveTour = data.tour || data;
    alleStopps = data.stopps || [];

    // Tour starten falls noch nicht
    if (aktiveTour.status === 'geplant') {
      await fetch(`/api/touren/${tourId}/starten`, {
        method:  'POST',
        headers: { 'Authorization': 'Bearer ' + Auth.getToken() }
      });
      aktiveTour.status = 'gestartet';
    }

    document.getElementById('view-tours').style.display       = 'none';
    document.getElementById('view-active-tour').style.display = 'block';

    renderTour();
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

// ── TOUR RENDERN ──────────────────────────────────────────────
function renderTour() {
  const done    = alleStopps.filter(s => s.status === 'abgeschlossen' || s.status === 'uebersprungen').length;
  const gesamt  = alleStopps.length;
  const current = alleStopps.find(s => s.status === 'ausstehend');

  // Progress
  document.getElementById('tour-progress-bar').innerHTML = `
    <div class="progress-ring">
      <div><div class="ring-val">${done}/${gesamt}</div><div class="ring-lbl">Stopps erledigt</div></div>
      <div style="flex:1">
        <div class="progress-wrap" style="height:8px">
          <div class="progress-bar" style="width:${gesamt > 0 ? Math.round(done/gesamt*100) : 0}%"></div>
        </div>
      </div>
      <div style="font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--green)">
        ${gesamt > 0 ? Math.round(done/gesamt*100) : 0}%
      </div>
    </div>
  `;

  // Tour-Info
  document.getElementById('tour-info-card').innerHTML = `
    <div class="tour-header">
      <div>
        <div class="tour-typ">${aktiveTour.typ === 'abholung' ? '🌾' : aktiveTour.typ === 'auslieferung' ? '🚚' : '🔄'} ${aktiveTour.typ}</div>
        <div class="tour-meta">${aktiveTour.fahrzeug_bezeichnung || 'Kein Fahrzeug'} · ${aktiveTour.startzeit?.slice(0,5) || '—'} Uhr</div>
      </div>
      ${statusBadge(aktiveTour.status)}
    </div>
    ${aktiveTour.notiz ? `<div style="font-size:13px;color:var(--text2);padding:.5rem .75rem;background:var(--bg);border-radius:4px">${aktiveTour.notiz}</div>` : ''}
  `;

  // Stopps
  const container = document.getElementById('stopps-container');
  if (!alleStopps.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📍</div><div>Keine Stopps</div></div>';
    return;
  }

  container.innerHTML = alleStopps.map((s, idx) => {
    const isCurrent = s === current;
    const isDone    = s.status === 'abgeschlossen';
    const isSkipped = s.status === 'uebersprungen';
    const cls = isCurrent ? 'current' : isDone ? 'done' : isSkipped ? 'skipped' : '';

    const mapsUrl = s.adresse
      ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.adresse)}`
      : null;

    return `
      <div class="stopp-card ${cls}" id="stopp-${s.id}">
        <div class="stopp-row">
          <div class="stopp-nr ${cls}">${isDone ? '✓' : isSkipped ? '–' : s.reihenfolge}</div>
          <div class="stopp-body">
            <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
              <span class="stopp-name">${s.name}</span>
              <span class="badge ${s.typ === 'abholung' ? 'badge-amber' : 'badge-green'}">${s.typ}</span>
            </div>
            ${s.adresse ? `<div class="stopp-addr">${s.adresse}</div>` : ''}
            ${s.produkt ? `<div class="stopp-ware">${s.produkt}${s.menge_geplant_kg ? ' · ' + s.menge_geplant_kg + ' kg geplant' : ''}</div>` : ''}
            ${isDone && s.menge_geladen_kg ? `<div style="color:var(--green);font-size:12px;font-family:'DM Mono',monospace;margin-top:2px">✓ ${s.menge_geladen_kg} kg ${s.typ === 'abholung' ? 'abgeholt' : 'geliefert'}</div>` : ''}
            ${isSkipped && s.notiz_abschluss ? `<div style="color:var(--text3);font-size:12px;margin-top:2px">Übersprungen: ${s.notiz_abschluss}</div>` : ''}

            ${isCurrent ? `
              <div class="stopp-actions">
                ${mapsUrl ? `<a href="${mapsUrl}" target="_blank" rel="noopener" class="btn btn-sm">🗺 Maps</a>` : ''}
                <button class="btn btn-sm btn-primary" data-action="arrive" data-tour="${aktiveTour.id}" data-stopp="${s.id}">
                  📍 Angekommen
                </button>
              </div>
            ` : ''}

            ${isCurrent && s.status_lokal === 'angekommen' ? renderConfirmForm(s) : ''}
          </div>
        </div>
      </div>`;
  }).join('');

  // Alle fertig?
  if (done === gesamt && gesamt > 0) {
    setTimeout(() => {
      document.getElementById('view-active-tour').style.display = 'none';
      document.getElementById('view-done').style.display        = 'block';
    }, 800);
    return;
  }

  // Event-Delegation
  container.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, tour, stopp } = btn.dataset;

    if (action === 'arrive') {
      await doAnkommen(tour, stopp);
    } else if (action === 'confirm') {
      await doAbschliessen(tour, stopp);
    } else if (action === 'skip') {
      const notiz = prompt('Grund fürs Überspringen (optional):') || '';
      await doUeberspringen(tour, stopp, notiz);
    }
  });
}

function renderConfirmForm(s) {
  return `
    <div class="confirm-form">
      <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem">
        Stopp abschließen
      </div>
      <div style="display:flex;gap:.5rem;margin-bottom:.75rem">
        <div style="flex:1">
          <label style="font-size:11px;color:var(--text3);display:block;margin-bottom:3px">${s.typ === 'abholung' ? 'Abgeholt' : 'Geliefert'} (kg)</label>
          <input class="form-control" type="number" id="menge-${s.id}" min="0" step="0.1"
            placeholder="${s.menge_geplant_kg || '0'}" style="padding:6px 10px">
        </div>
      </div>
      <div style="margin-bottom:.75rem">
        <label style="font-size:11px;color:var(--text3);display:block;margin-bottom:3px">Notiz (optional)</label>
        <input class="form-control" id="notiz-${s.id}" placeholder="Bemerkung" style="padding:6px 10px">
      </div>
      <div style="display:flex;gap:.5rem">
        <button class="btn btn-primary btn-sm" data-action="confirm" data-tour="${aktiveTour.id}" data-stopp="${s.id}">
          ✓ Bestätigen
        </button>
        <button class="btn btn-sm" data-action="skip" data-tour="${aktiveTour.id}" data-stopp="${s.id}">
          Überspringen
        </button>
      </div>
    </div>
  `;
}

// ── AKTIONEN ──────────────────────────────────────────────────
async function doAnkommen(tourId, stoppId) {
  try {
    await fetch(`/api/touren/${tourId}/stopps/${stoppId}/ankommen`, {
      method:  'POST',
      headers: { 'Authorization': 'Bearer ' + Auth.getToken() }
    });
    // Lokalen Status setzen für Formular-Rendering
    const s = alleStopps.find(x => x.id === stoppId);
    if (s) s.status_lokal = 'angekommen';
    renderTour();
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

async function doAbschliessen(tourId, stoppId) {
  const menge = parseFloat(document.getElementById('menge-' + stoppId)?.value || 0);
  const notiz = document.getElementById('notiz-' + stoppId)?.value || '';
  try {
    await fetch(`/api/touren/${tourId}/stopps/${stoppId}/abschliessen`, {
      method:  'POST',
      headers: { 'Authorization': 'Bearer ' + Auth.getToken(), 'Content-Type': 'application/json' },
      body:    JSON.stringify({ menge_geladen_kg: menge || null, notiz }),
    });
    // Tour neu laden
    const s = alleStopps.find(x => x.id === stoppId);
    if (s) { s.status = 'abgeschlossen'; s.menge_geladen_kg = menge; s.status_lokal = null; }
    renderTour();
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

async function doUeberspringen(tourId, stoppId, notiz) {
  try {
    await fetch(`/api/touren/${tourId}/stopps/${stoppId}/ueberspringen`, {
      method:  'POST',
      headers: { 'Authorization': 'Bearer ' + Auth.getToken(), 'Content-Type': 'application/json' },
      body:    JSON.stringify({ notiz }),
    });
    const s = alleStopps.find(x => x.id === stoppId);
    if (s) { s.status = 'uebersprungen'; s.notiz_abschluss = notiz; s.status_lokal = null; }
    renderTour();
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

// ── INIT ──────────────────────────────────────────────────────
loadTouren();
</script>
</body>
</html>
