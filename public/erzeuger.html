<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LieferPool – Erzeuger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="hdr" id="app-header"></header>
  <main class="main">
    <div id="alerts"></div>

    <!-- POOLS -->
    <div id="view-pools" class="view">
      <div class="grid4" style="margin-bottom:1rem" id="metrics-pools"></div>
      <div class="grid2">
        <div class="card">
          <div class="card-title">Offene Lieferpools</div>
          <div id="pools-list"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <div class="card-title">Meine Zusagen</div>
          <div id="commitments-list"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- ZUSAGEN -->
    <div id="view-zusagen" class="view" style="display:none">
      <div class="card">
        <div class="card-title">Verfügbare Pools</div>
        <div id="pool-status-list"></div>
      </div>
      <div class="card">
        <div class="card-title">Menge zusagen</div>
        <div id="commit-result"></div>
        <div id="commit-form">
          <div class="form-group">
            <label class="form-label">Pool / Produkt</label>
            <select class="form-control" id="commit-pool-sel"></select>
          </div>
          <div class="grid2">
            <div class="form-group">
              <label class="form-label">Menge (kg)</label>
              <input class="form-control" type="number" id="commit-menge" min="1" placeholder="z.B. 120">
            </div>
            <div class="form-group">
              <label class="form-label">Erwarteter Erlös</label>
              <div class="form-control" id="erloes-preview" style="color:var(--green);font-family:'DM Mono',monospace;background:var(--bg)">
                — €
              </div>
            </div>
          </div>
          <div id="erloes-box" class="erloes-box" style="display:none"></div>
          <button class="btn btn-primary" id="btn-commit" disabled>Commitment absenden</button>
        </div>
      </div>
    </div>

    <!-- AUSZAHLUNGEN -->
    <div id="view-auszahlung" class="view" style="display:none">
      <div class="grid2" style="margin-bottom:1rem" id="az-metrics"></div>
      <div class="card">
        <div class="section-hdr">
          <span class="section-title">Auszahlungshistorie</span>
          <button class="btn btn-sm" id="btn-export-az">↓ CSV Export</button>
        </div>
        <div id="az-list"></div>
      </div>
      <div class="card">
        <div class="card-title">Abrechnung</div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6">
          Erstelle eine druckbare Abrechnung aller deiner Auszahlungen für deine Buchhaltung.
        </p>
        <div class="grid2" style="margin-bottom:1rem">
          <div class="form-group">
            <label class="form-label">Von</label>
            <input class="form-control" type="date" id="az-von">
          </div>
          <div class="form-group">
            <label class="form-label">Bis</label>
            <input class="form-control" type="date" id="az-bis">
          </div>
        </div>
        <button class="btn btn-primary" id="btn-abrechnung">Abrechnung öffnen (druckbar)</button>
      </div>
    </div>

    <!-- PROFIL -->
    <div id="view-profil" class="view" style="display:none">
      <div class="grid2">
        <div class="card">
          <div class="card-title">Betriebsdaten</div>
          <div class="form-group">
            <label class="form-label">Betriebsname</label>
            <input class="form-control" id="p-name">
          </div>
          <div class="form-group">
            <label class="form-label">Region</label>
            <select class="form-control" id="p-region">
              <option>NRW</option><option>Bayern</option><option>BW</option>
              <option>Niedersachsen</option><option>Bundesweit</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">IBAN (für SEPA-Auszahlung)</label>
            <input class="form-control" id="p-iban" placeholder="DE89 3704 0044...">
          </div>
          <button class="btn btn-primary btn-sm" id="btn-save-profil">Speichern</button>
          <div id="profil-result" style="margin-top:.75rem"></div>
        </div>

        <div class="card">
          <div class="card-title">Zertifikat einreichen</div>
          <div class="form-group">
            <label class="form-label">Typ</label>
            <select class="form-control" id="z-typ">
              <option>Bio</option><option>QS</option><option>Demeter</option><option>Hygiene</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Zertifikat-Nummer</label>
            <input class="form-control" id="z-nr" placeholder="Bio-DE-001-2024">
          </div>
          <div class="form-group">
            <label class="form-label">Gültig bis</label>
            <input class="form-control" type="date" id="z-datum">
          </div>
          <button class="btn btn-primary btn-sm" id="btn-zert">Einreichen</button>
          <div id="zert-result" style="margin-top:.75rem"></div>
          <div style="margin-top:1.5rem">
            <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem">Meine Zertifikate</div>
            <div id="zert-list"></div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
const user = requireAuth('erzeuger');
if (!user) throw 'not auth';

const NAV = [
  { id: 'pools',      label: 'Pools' },
  { id: 'zusagen',    label: 'Menge zusagen' },
  { id: 'auszahlung', label: 'Auszahlungen' },
  { id: 'profil',     label: 'Profil & Zertifikate' },
];

let openPools = [];
let erzeugerProfil = null;

renderHeader('pools', NAV, (v) => { showView(v); loadView(v); });

function setHTML(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

async function loadView(v) {
  if (v === 'pools')      loadPools();
  if (v === 'zusagen')    loadZusagen();
  if (v === 'auszahlung') loadAuszahlungen();
  if (v === 'profil')     loadProfil();
}

// ── POOLS ─────────────────────────────────────────────────────
async function loadPools() {
  try {
    const [{ pools }, me] = await Promise.all([
      api.getPools({ status: 'offen' }),
      api.getErzeugerMe(),
    ]);
    openPools = pools;

    const aktiveCommitments  = me.commitments.filter(c => c.status === 'aktiv').length;
    const geliefertCount     = me.commitments.filter(c => c.status === 'geliefert').length;
    const verifZerts         = me.zertifikate.filter(z => z.status === 'verified').length;
    const gesamtErloes       = me.auszahlungen?.reduce((s, a) => s + parseFloat(a.netto || 0), 0) || 0;

    setHTML('metrics-pools', `
      <div class="metric"><div class="metric-label">Offene Pools</div><div class="metric-val green">${pools.length}</div></div>
      <div class="metric"><div class="metric-label">Aktive Zusagen</div><div class="metric-val">${aktiveCommitments}</div></div>
      <div class="metric"><div class="metric-label">Geliefert</div><div class="metric-val">${geliefertCount}</div></div>
      <div class="metric"><div class="metric-label">Zertifikate</div>
        <div class="metric-val ${verifZerts > 0 ? 'green' : 'amber'}">${verifZerts}</div></div>
    `);

    setHTML('pools-list', pools.length ? pools.map(p => `
      <div class="pool-item">
        <div class="pool-row">
          <span class="pool-name">${p.produkt}</span>
          ${statusBadge(p.status)}
        </div>
        <div class="pool-row" style="margin-top:4px">
          <span class="pool-meta">${p.lieferwoche} · ${p.region} · ${fmt(p.preis_pro_einheit)} €/kg</span>
          <span class="pool-meta">${p.erzeuger_count || 0} Erzeuger</span>
        </div>
        ${poolBar(p.menge_committed, p.menge_ziel)}
      </div>
    `).join('') : '<p style="color:var(--text3);font-size:13px">Keine offenen Pools</p>');

    setHTML('commitments-list', me.commitments.length ? `
      <table class="tbl">
        <thead><tr><th>Produkt</th><th>KW</th><th>Menge</th><th>Status</th></tr></thead>
        <tbody>${me.commitments.map(c => `
          <tr>
            <td style="font-weight:500">${c.produkt}</td>
            <td class="pool-meta">${c.lieferwoche}</td>
            <td class="pool-meta">${fmt(c.menge, 0)} kg</td>
            <td>${statusBadge(c.status)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    ` : '<p style="color:var(--text3);font-size:13px">Noch keine Zusagen</p>');

  } catch (err) { showAlert('alerts', 'error', err.message); }
}

// ── ZUSAGEN ───────────────────────────────────────────────────
async function loadZusagen() {
  try {
    const { pools } = await api.getPools({ status: 'offen' });
    openPools = pools;

    setHTML('pool-status-list', pools.length ? pools.map(p => `
      <div class="pool-item">
        <div class="pool-row">
          <span class="pool-name">${p.produkt}</span>
          <span class="pool-meta">${fmt(p.preis_pro_einheit)} €/kg</span>
        </div>
        <span class="pool-meta">${p.lieferwoche} · Ziel: ${Math.round(p.menge_ziel)} kg · Deadline: ${new Date(p.deadline).toLocaleDateString('de-DE')}</span>
        ${poolBar(p.menge_committed, p.menge_ziel)}
      </div>
    `).join('') : '<p style="color:var(--text3);font-size:13px">Keine offenen Pools</p>');

    const sel = document.getElementById('commit-pool-sel');
    if (sel) sel.innerHTML = pools.length
      ? pools.map(p => `<option value="${p.id}" data-preis="${p.preis_pro_einheit}">${p.produkt} (${p.lieferwoche}) · ${fmt(p.preis_pro_einheit)} €/kg</option>`).join('')
      : '<option>Keine offenen Pools</option>';

    updateErloes();
  } catch (err) { showAlert('alerts', 'error', err.message); }
}

function updateErloes() {
  const sel   = document.getElementById('commit-pool-sel');
  const menge = parseFloat(document.getElementById('commit-menge')?.value || 0);
  const preis = parseFloat(sel?.options[sel.selectedIndex]?.dataset.preis || 0);
  const btn   = document.getElementById('btn-commit');
  const box   = document.getElementById('erloes-box');
  const prev  = document.getElementById('erloes-preview');

  if (menge > 0 && preis > 0) {
    const brutto = menge * preis;
    const fee    = brutto * 0.01;
    const netto  = brutto - fee;
    if (prev) prev.textContent = fmt(netto) + ' €';
    if (box)  { box.style.display = 'block'; box.innerHTML = `
      <div class="erloes-row"><span class="lbl">Brutto</span><span>${fmt(brutto)} €</span></div>
      <div class="erloes-row"><span class="lbl">Plattformfee (1%)</span><span>−${fmt(fee)} €</span></div>
      <div class="erloes-row"><span class="lbl">Netto (SEPA Instant)</span><span class="erloes-total">${fmt(netto)} €</span></div>
    `; }
    if (btn) btn.disabled = false;
  } else {
    if (prev) prev.textContent = '— €';
    if (box)  box.style.display = 'none';
    if (btn)  btn.disabled = true;
  }
}

document.getElementById('commit-menge')?.addEventListener('input', updateErloes);
document.getElementById('commit-pool-sel')?.addEventListener('change', updateErloes);

document.getElementById('btn-commit')?.addEventListener('click', async () => {
  const poolId = document.getElementById('commit-pool-sel').value;
  const menge  = parseFloat(document.getElementById('commit-menge').value);
  const btn    = document.getElementById('btn-commit');
  if (!poolId || !menge) return;
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sende...';
  try {
    const res = await api.commitQuantity(poolId, menge);
    setHTML('commit-result', `
      <div class="success-box">
        <div class="success-icon">✓</div>
        <div class="success-title">Commitment erfolgreich</div>
        <div class="success-sub">${menge} kg · Pool ${res.pool_fuellstand}% gefüllt</div>
        ${chainInfo(res.chain?.txHash)}
      </div>`);
    const form = document.getElementById('commit-form');
    if (form) form.style.display = 'none';
    document.getElementById('commit-menge').value = '';
    loadZusagen();
  } catch (err) {
    btn.textContent = 'Commitment absenden'; btn.disabled = false;
    showAlert('alerts', 'error', err.message);
  }
});

// ── AUSZAHLUNGEN ──────────────────────────────────────────────
async function loadAuszahlungen() {
  try {
    const { auszahlungen, gesamt, ausstehend } = await api.getAuszahlungen();
    setHTML('az-metrics', `
      <div class="metric"><div class="metric-label">Gesamt ausgezahlt</div><div class="metric-val green">${fmt(gesamt)} €</div></div>
      <div class="metric"><div class="metric-label">Ausstehend</div><div class="metric-val amber">${fmt(ausstehend)} €</div></div>
    `);

    setHTML('az-list', auszahlungen.length ? `
      <table class="tbl">
        <thead><tr><th>Datum</th><th>Produkt</th><th>KW</th><th>Menge</th><th>Netto</th><th>Status</th></tr></thead>
        <tbody>${auszahlungen.map(a => `
          <tr>
            <td class="pool-meta">${new Date(a.created_at).toLocaleDateString('de-DE')}</td>
            <td style="font-weight:500">${a.produkt || '—'}</td>
            <td class="pool-meta">${a.lieferwoche || '—'}</td>
            <td class="pool-meta">${fmt(a.commitment_menge || 0, 0)} kg</td>
            <td style="font-family:'DM Mono',monospace;color:var(--green);font-weight:500">${fmt(a.netto)} €</td>
            <td>${statusBadge(a.status)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    ` : '<p style="color:var(--text3);font-size:13px">Noch keine Auszahlungen</p>');

  } catch (err) { showAlert('alerts', 'error', err.message); }
}

document.getElementById('btn-export-az')?.addEventListener('click', () => {
  api.downloadAuszahlungenCSV();
});

document.getElementById('btn-abrechnung')?.addEventListener('click', async () => {
  try {
    const me = await api.getErzeugerMe();
    const von = document.getElementById('az-von').value || undefined;
    const bis = document.getElementById('az-bis').value || undefined;
    api.openAbrechnung(me.erzeuger.id, { von, bis });
  } catch (err) { showAlert('alerts', 'error', err.message); }
});

// ── PROFIL ────────────────────────────────────────────────────
async function loadProfil() {
  try {
    const { erzeuger, zertifikate } = await api.getErzeugerMe();
    erzeugerProfil = erzeuger;
    const nameEl = document.getElementById('p-name');
    const regionEl = document.getElementById('p-region');
    const ibanEl = document.getElementById('p-iban');
    if (nameEl)   nameEl.value   = erzeuger.betrieb_name || '';
    if (regionEl) regionEl.value = erzeuger.region       || 'NRW';
    if (ibanEl)   ibanEl.value   = erzeuger.iban         || '';

    setHTML('zert-list', zertifikate.length ? zertifikate.map(z => `
      <div class="auszahl-row">
        <div>
          <div style="font-size:13px;font-weight:500">${z.typ} · ${z.zert_nummer}</div>
          <div class="pool-meta">Gültig bis ${z.gueltig_bis?.split('T')[0] || '—'}</div>
          ${chainInfo(z.chain_tx)}
        </div>
        ${statusBadge(z.status)}
      </div>
    `).join('') : '<p style="color:var(--text3);font-size:13px">Noch keine Zertifikate</p>');

  } catch (err) { showAlert('alerts', 'error', err.message); }
}

document.getElementById('btn-save-profil')?.addEventListener('click', async () => {
  const btn = document.getElementById('btn-save-profil');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    await api.updateErzeuger({
      betrieb_name: document.getElementById('p-name').value,
      region:       document.getElementById('p-region').value,
      iban:         document.getElementById('p-iban').value,
    });
    setHTML('profil-result', '<div class="alert alert-success">✓ Profil gespeichert</div>');
    btn.textContent = 'Speichern'; btn.disabled = false;
    setTimeout(() => setHTML('profil-result', ''), 3000);
  } catch (err) {
    btn.textContent = 'Speichern'; btn.disabled = false;
    showAlert('alerts', 'error', err.message);
  }
});

document.getElementById('btn-zert')?.addEventListener('click', async () => {
  const typ    = document.getElementById('z-typ').value;
  const nr     = document.getElementById('z-nr').value.trim();
  const datum  = document.getElementById('z-datum').value;
  const btn    = document.getElementById('btn-zert');
  if (!nr) return showAlert('alerts', 'error', 'Zertifikat-Nummer eingeben');
  btn.disabled = true;
  try {
    await api.addZertifikat({ typ, zert_nummer: nr, gueltig_bis: datum || null });
    setHTML('zert-result', '<div class="alert alert-success">Eingereicht · Prüfung ausstehend</div>');
    document.getElementById('z-nr').value = '';
    btn.disabled = false;
    loadProfil();
  } catch (err) {
    btn.disabled = false;
    showAlert('alerts', 'error', err.message);
  }
});

// ── INIT ──────────────────────────────────────────────────────
loadPools();
</script>
</body>
</html>
