<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LieferPool – Erzeuger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="hdr" id="app-header"></header>
  <main class="main">
    <div id="alerts"></div>

    <!-- POOLS -->
    <div id="view-pools" class="view">
      <div class="grid4" style="margin-bottom:1rem" id="metrics-pools"></div>
      <div class="grid2">
        <div class="card">
          <div class="card-title">Offene Lieferpools</div>
          <div id="pools-list"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <div class="card-title">Meine Zusagen</div>
          <div id="commitments-list"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- ZUSAGEN -->
    <div id="view-zusagen" class="view" style="display:none">
      <div class="card">
        <div class="card-title">Verfügbare Pools</div>
        <div id="pool-status-list"></div>
      </div>
      <div class="card">
        <div class="card-title">Menge zusagen</div>
        <div id="commit-result"></div>
        <div id="commit-form">
          <div class="form-group">
            <label class="form-label">Pool / Produkt</label>
            <select class="form-control" id="commit-pool-sel"></select>
          </div>
          <div class="grid2">
            <div class="form-group">
              <label class="form-label">Menge (kg)</label>
              <input class="form-control" type="number" id="commit-menge" min="1" placeholder="z.B. 120">
            </div>
            <div class="form-group">
              <label class="form-label">Erwarteter Erlös</label>
              <div class="form-control" id="erloes-preview" style="color:var(--green);font-family:'DM Mono',monospace;background:var(--bg)">
                — €
              </div>
            </div>
          </div>
          <div id="erloes-box" class="erloes-box" style="display:none"></div>
          <button class="btn btn-primary" id="btn-commit" disabled>Commitment absenden</button>
        </div>
      </div>
    </div>

    <!-- AUSZAHLUNGEN -->
    <div id="view-auszahlung" class="view" style="display:none">
      <div class="grid2" style="margin-bottom:1rem" id="az-metrics"></div>
      <div class="card">
        <div class="section-hdr">
          <span class="section-title">Auszahlungshistorie</span>
          <button class="btn btn-sm" id="btn-export-az">↓ CSV Export</button>
        </div>
        <div id="az-list"></div>
      </div>
      <div class="card">
        <div class="card-title">Abrechnung</div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6">
          Erstelle eine druckbare Abrechnung aller deiner Auszahlungen für deine Buchhaltung.
        </p>
        <div class="grid2" style="margin-bottom:1rem">
          <div class="form-group">
            <label class="form-label">Von</label>
            <input class="form-control" type="date" id="az-von">
          </div>
          <div class="form-group">
            <label class="form-label">Bis</label>
            <input class="form-control" type="date" id="az-bis">
          </div>
        </div>
        <button class="btn btn-primary" id="btn-abrechnung">Abrechnung öffnen (druckbar)</button>
      </div>
    </div>

    <!-- PROFIL -->
    <div id="view-profil" class="view" style="display:none">

      <!-- Account-Statistiken -->
      <div class="grid4" style="margin-bottom:1rem" id="profil-stats"></div>

      <div class="grid2">
        <!-- Linke Spalte: Betriebsdaten -->
        <div>
          <div class="card">
            <div class="card-title">Betrieb</div>
            <div id="profil-result"></div>
            <div class="grid2">
              <div class="form-group">
                <label class="form-label">Betriebsname *</label>
                <input class="form-control" id="p-name" placeholder="Hof Brüggemann">
              </div>
              <div class="form-group">
                <label class="form-label">Region *</label>
                <select class="form-control" id="p-region">
                  <option>NRW</option><option>Bayern</option><option>BW</option>
                  <option>Niedersachsen</option><option>Hessen</option>
                  <option>Sachsen</option><option>Bundesweit</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Straße &amp; Hausnummer</label>
              <input class="form-control" id="p-adresse" placeholder="Musterstraße 12">
            </div>
            <div class="grid2">
              <div class="form-group">
                <label class="form-label">PLZ</label>
                <input class="form-control" id="p-plz" placeholder="50969" maxlength="10">
              </div>
              <div class="form-group">
                <label class="form-label">Ort</label>
                <input class="form-control" id="p-ort" placeholder="Köln">
              </div>
            </div>
            <div class="grid2">
              <div class="form-group">
                <label class="form-label">Telefon</label>
                <input class="form-control" id="p-telefon" placeholder="+49 221 123456" type="tel">
              </div>
              <div class="form-group">
                <label class="form-label">Website</label>
                <input class="form-control" id="p-website" placeholder="https://hof-beispiel.de">
              </div>
            </div>
            <div class="grid2">
              <div class="form-group">
                <label class="form-label">Betriebsgröße</label>
                <select class="form-control" id="p-groesse">
                  <option value="klein">Klein (&lt; 5 ha)</option>
                  <option value="mittel">Mittel (5–50 ha)</option>
                  <option value="gross">Groß (&gt; 50 ha)</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Gründungsjahr</label>
                <input class="form-control" id="p-gruendung" type="number" min="1800" max="2099" placeholder="z.B. 1987">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Beschreibung (für Caterer sichtbar)</label>
              <textarea class="form-control" id="p-beschreibung" rows="3" placeholder="Kurze Vorstellung deines Betriebs..."></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Produktsortiment</label>
              <input class="form-control" id="p-sortiment" placeholder="z.B. Karotten, Kartoffeln, Kohl, Kräuter">
            </div>
            <div class="form-group">
              <label class="form-label">Max. Wochenkapazität (kg)</label>
              <input class="form-control" id="p-kapazitaet" type="number" min="0" placeholder="z.B. 500">
            </div>
          </div>

          <div class="card">
            <div class="card-title">Zahlungsdaten</div>
            <div class="form-group">
              <label class="form-label">IBAN (für SEPA-Auszahlung)</label>
              <input class="form-control" id="p-iban" placeholder="DE89 3704 0044 0532 0130 00">
            </div>
            <div class="grid2">
              <div class="form-group">
                <label class="form-label">Bank</label>
                <input class="form-control" id="p-bank" placeholder="z.B. Volksbank Köln">
              </div>
              <div class="form-group">
                <label class="form-label">USt-ID (optional)</label>
                <input class="form-control" id="p-ustid" placeholder="DE123456789">
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">Passwort ändern</div>
            <div class="form-group">
              <label class="form-label">Aktuelles Passwort</label>
              <input class="form-control" type="password" id="pw-current" placeholder="••••••••">
            </div>
            <div class="grid2">
              <div class="form-group">
                <label class="form-label">Neues Passwort</label>
                <input class="form-control" type="password" id="pw-new" placeholder="min. 8 Zeichen">
              </div>
              <div class="form-group">
                <label class="form-label">Wiederholen</label>
                <input class="form-control" type="password" id="pw-new2" placeholder="••••••••">
              </div>
            </div>
            <div id="pw-result"></div>
            <button class="btn btn-sm" id="btn-change-pw">Passwort ändern</button>
          </div>

          <button class="btn btn-primary" id="btn-save-profil" style="width:100%">Profil speichern</button>
        </div>

        <!-- Rechte Spalte: Zertifikate + Account-Info -->
        <div>
          <div class="card">
            <div class="card-title">Account</div>
            <div id="account-info" style="font-size:13px;color:var(--text2);line-height:1.8"></div>
          </div>

          <div class="card">
            <div class="card-title">Zertifikat einreichen</div>
            <div id="zert-result" style="margin-bottom:.75rem"></div>
            <div class="grid2">
              <div class="form-group">
                <label class="form-label">Typ</label>
                <select class="form-control" id="z-typ">
                  <option value="Bio">Bio (DE-ÖKO)</option>
                  <option value="QS">QS-Zertifizierung</option>
                  <option value="Demeter">Demeter</option>
                  <option value="Naturland">Naturland</option>
                  <option value="GlobalGAP">GlobalG.A.P.</option>
                  <option value="Hygiene">Hygieneschulung</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Gültig bis</label>
                <input class="form-control" type="date" id="z-datum">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Zertifikat-Nummer</label>
              <input class="form-control" id="z-nr" placeholder="Bio-DE-001-2024">
            </div>
            <button class="btn btn-primary btn-sm" id="btn-zert">Einreichen</button>
          </div>

          <div class="card">
            <div class="section-hdr">
              <span class="section-title">Meine Zertifikate</span>
            </div>
            <div id="zert-list"></div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
const user = requireAuth('erzeuger');
if (!user) throw 'not auth';

const NAV = [
  { id: 'pools',      label: 'Pools' },
  { id: 'zusagen',    label: 'Menge zusagen' },
  { id: 'auszahlung', label: 'Auszahlungen' },
  { id: 'profil',     label: 'Profil & Zertifikate' },
];

let openPools = [];
let erzeugerProfil = null;

renderHeader('pools', NAV, (v) => { showView(v); loadView(v); });

function setHTML(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}

async function loadView(v) {
  if (v === 'pools')      loadPools();
  if (v === 'zusagen')    loadZusagen();
  if (v === 'auszahlung') loadAuszahlungen();
  if (v === 'profil')     loadProfil();
}

// ── POOLS ─────────────────────────────────────────────────────
async function loadPools() {
  try {
    const [{ pools }, me] = await Promise.all([
      api.getPools({ status: 'offen' }),
      api.getErzeugerMe(),
    ]);
    openPools = pools;

    const aktiveCommitments  = me.commitments.filter(c => c.status === 'aktiv').length;
    const geliefertCount     = me.commitments.filter(c => c.status === 'geliefert').length;
    const verifZerts         = me.zertifikate.filter(z => z.status === 'verified').length;
    const gesamtErloes       = me.auszahlungen?.reduce((s, a) => s + parseFloat(a.netto || 0), 0) || 0;

    setHTML('metrics-pools', `
      <div class="metric"><div class="metric-label">Offene Pools</div><div class="metric-val green">${pools.length}</div></div>
      <div class="metric"><div class="metric-label">Aktive Zusagen</div><div class="metric-val">${aktiveCommitments}</div></div>
      <div class="metric"><div class="metric-label">Geliefert</div><div class="metric-val">${geliefertCount}</div></div>
      <div class="metric"><div class="metric-label">Zertifikate</div>
        <div class="metric-val ${verifZerts > 0 ? 'green' : 'amber'}">${verifZerts}</div></div>
    `);

    setHTML('pools-list', pools.length ? pools.map(p => `
      <div class="pool-item">
        <div class="pool-row">
          <span class="pool-name">${p.produkt}</span>
          ${statusBadge(p.status)}
        </div>
        <div class="pool-row" style="margin-top:4px">
          <span class="pool-meta">${p.lieferwoche} · ${p.region} · ${fmt(p.preis_pro_einheit)} €/kg</span>
          <span class="pool-meta">${p.erzeuger_count || 0} Erzeuger</span>
        </div>
        ${poolBar(p.menge_committed, p.menge_ziel)}
      </div>
    `).join('') : '<p style="color:var(--text3);font-size:13px">Keine offenen Pools</p>');

    setHTML('commitments-list', me.commitments.length ? me.commitments.map(c => `
      <div class="pool-item" data-pool-id="${c.pool_id}" title="Klicken für Pool-Details">
        <div class="pool-row">
          <span class="pool-name">${c.produkt}</span>
          <div style="display:flex;align-items:center;gap:.5rem">
            ${statusBadge(c.status)}
            ${c.pool_status==='offen'&&c.status==='aktiv'?`<button class="btn btn-sm btn-danger" style="padding:2px 8px;font-size:11px" data-action="withdraw" data-pool-id="${c.pool_id}">Zurückziehen</button>`:''}
          </div>
        </div>
        <div class="pool-row" style="margin-top:3px">
          <span class="pool-meta">${c.lieferwoche}</span>
          <span class="pool-meta" style="font-family:'DM Mono',monospace;color:var(--green)">${fmt(c.menge, 0)} kg · ${fmt(c.menge * parseFloat(c.preis_pro_einheit||0) * 0.99)} € erw.</span>
        </div>
      </div>
    `).join('') : '<p style="color:var(--text3);font-size:13px">Noch keine Zusagen</p>');

  } catch (err) { showAlert('alerts', 'error', err.message); }
}

// ── ZUSAGEN ───────────────────────────────────────────────────
async function loadZusagen() {
  try {
    const { pools } = await api.getPools({ status: 'offen' });
    openPools = pools;

    // Preisvergleich: höchsten Preis pro Produkt markieren
    const preisPerProdukt = {};
    pools.forEach(p => {
      const preis = parseFloat(p.preis_pro_einheit);
      if (!preisPerProdukt[p.produkt] || preis > preisPerProdukt[p.produkt]) {
        preisPerProdukt[p.produkt] = preis;
      }
    });

    setHTML('pool-status-list', pools.length ? pools.map(p => {
      const preis = parseFloat(p.preis_pro_einheit);
      const istBester = preis >= preisPerProdukt[p.produkt];
      const erloes100 = (100 * preis * 0.99).toFixed(2);
      return `
      <div class="pool-item" data-pool-id="${p.id}">
        <div class="pool-row">
          <span class="pool-name">${p.produkt}</span>
          <div style="display:flex;gap:.5rem;align-items:center">
            <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:${istBester?'var(--green)':'var(--text2)'}">${fmt(preis)} €/kg ${istBester?'⭐':''}</span>
            ${deadlineCountdown(p.deadline)}
          </div>
        </div>
        <div class="pool-row" style="margin-top:3px">
          <span class="pool-meta">${p.lieferwoche} · Ziel: ${Math.round(p.menge_ziel)} kg · ${p.erzeuger_count||0} Erzeuger</span>
          <span class="pool-meta" style="color:var(--green)">≈ ${erloes100} € / 100 kg</span>
        </div>
        ${poolBar(p.menge_committed, p.menge_ziel)}
      </div>`;
    }).join('') : '<p style="color:var(--text3);font-size:13px">Keine offenen Pools</p>');

    const sel = document.getElementById('commit-pool-sel');
    if (sel) sel.innerHTML = pools.length
      ? pools.map(p => `<option value="${p.id}" data-preis="${p.preis_pro_einheit}">${p.produkt} (${p.lieferwoche}) · ${fmt(p.preis_pro_einheit)} €/kg</option>`).join('')
      : '<option>Keine offenen Pools</option>';

    updateErloes();
  } catch (err) { showAlert('alerts', 'error', err.message); }
}

function updateErloes() {
  const sel   = document.getElementById('commit-pool-sel');
  const menge = parseFloat(document.getElementById('commit-menge')?.value || 0);
  const preis = parseFloat(sel?.options[sel.selectedIndex]?.dataset.preis || 0);
  const btn   = document.getElementById('btn-commit');
  const box   = document.getElementById('erloes-box');
  const prev  = document.getElementById('erloes-preview');

  if (menge > 0 && preis > 0) {
    const brutto = menge * preis;
    const fee    = brutto * 0.01;
    const netto  = brutto - fee;
    if (prev) prev.textContent = fmt(netto) + ' €';
    if (box)  { box.style.display = 'block'; box.innerHTML = `
      <div class="erloes-row"><span class="lbl">Brutto</span><span>${fmt(brutto)} €</span></div>
      <div class="erloes-row"><span class="lbl">Plattformfee (1%)</span><span>−${fmt(fee)} €</span></div>
      <div class="erloes-row"><span class="lbl">Netto (SEPA Instant)</span><span class="erloes-total">${fmt(netto)} €</span></div>
    `; }
    if (btn) btn.disabled = false;
  } else {
    if (prev) prev.textContent = '— €';
    if (box)  box.style.display = 'none';
    if (btn)  btn.disabled = true;
  }
}

document.getElementById('commit-menge')?.addEventListener('input', updateErloes);
document.getElementById('commit-pool-sel')?.addEventListener('change', updateErloes);

document.getElementById('btn-commit')?.addEventListener('click', async () => {
  const poolId = document.getElementById('commit-pool-sel').value;
  const menge  = parseFloat(document.getElementById('commit-menge').value);
  const btn    = document.getElementById('btn-commit');
  if (!poolId || !menge) return;
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sende...';
  try {
    const res = await api.commitQuantity(poolId, menge);
    setHTML('commit-result', `
      <div class="success-box">
        <div class="success-icon">✓</div>
        <div class="success-title">Commitment erfolgreich</div>
        <div class="success-sub">${menge} kg · Pool ${res.pool_fuellstand}% gefüllt</div>
        ${chainInfo(res.chain?.txHash)}
      </div>`);
    const form = document.getElementById('commit-form');
    if (form) form.style.display = 'none';
    document.getElementById('commit-menge').value = '';
    loadZusagen();
  } catch (err) {
    btn.textContent = 'Commitment absenden'; btn.disabled = false;
    showAlert('alerts', 'error', err.message);
  }
});

// ── AUSZAHLUNGEN ──────────────────────────────────────────────
async function loadAuszahlungen() {
  try {
    const { auszahlungen, gesamt, ausstehend } = await api.getAuszahlungen();
    setHTML('az-metrics', `
      <div class="metric"><div class="metric-label">Gesamt ausgezahlt</div><div class="metric-val green">${fmt(gesamt)} €</div></div>
      <div class="metric"><div class="metric-label">Ausstehend</div><div class="metric-val amber">${fmt(ausstehend)} €</div></div>
    `);

    setHTML('az-list', auszahlungen.length ? `
      <table class="tbl">
        <thead><tr><th>Datum</th><th>Produkt</th><th>KW</th><th>Menge</th><th>Netto</th><th>Status</th></tr></thead>
        <tbody>${auszahlungen.map(a => `
          <tr>
            <td class="pool-meta">${new Date(a.created_at).toLocaleDateString('de-DE')}</td>
            <td style="font-weight:500">${a.produkt || '—'}</td>
            <td class="pool-meta">${a.lieferwoche || '—'}</td>
            <td class="pool-meta">${fmt(a.commitment_menge || 0, 0)} kg</td>
            <td style="font-family:'DM Mono',monospace;color:var(--green);font-weight:500">${fmt(a.netto)} €</td>
            <td>${statusBadge(a.status)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    ` : '<p style="color:var(--text3);font-size:13px">Noch keine Auszahlungen</p>');

  } catch (err) { showAlert('alerts', 'error', err.message); }
}

document.getElementById('btn-export-az')?.addEventListener('click', () => {
  api.downloadAuszahlungenCSV();
});

document.getElementById('btn-abrechnung')?.addEventListener('click', async () => {
  try {
    const me = await api.getErzeugerMe();
    const von = document.getElementById('az-von').value || undefined;
    const bis = document.getElementById('az-bis').value || undefined;
    api.openAbrechnung(me.erzeuger.id, { von, bis });
  } catch (err) { showAlert('alerts', 'error', err.message); }
});

// ── PROFIL ────────────────────────────────────────────────────
async function loadProfil() {
  try {
    const { erzeuger, zertifikate, commitments, auszahlungen } = await api.getErzeugerMe();
    erzeugerProfil = erzeuger;

    // Felder befüllen
    const fields = {
      'p-name':        erzeuger.betrieb_name,
      'p-region':      erzeuger.region,
      'p-adresse':     erzeuger.adresse,
      'p-plz':         erzeuger.plz,
      'p-ort':         erzeuger.ort,
      'p-telefon':     erzeuger.telefon,
      'p-website':     erzeuger.website,
      'p-beschreibung':erzeuger.beschreibung,
      'p-sortiment':   erzeuger.sortiment,
      'p-kapazitaet':  erzeuger.max_kapazitaet,
      'p-groesse':     erzeuger.betriebsgroesse,
      'p-gruendung':   erzeuger.gruendungsjahr,
      'p-iban':        erzeuger.iban,
      'p-bank':        erzeuger.bank_name,
      'p-ustid':       erzeuger.ust_id,
    };
    Object.entries(fields).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el && val != null) el.value = val;
    });

    // Statistiken
    const geliefert  = commitments.filter(c => c.pool_status === 'geliefert').length;
    const aktiv      = commitments.filter(c => c.status === 'aktiv').length;
    const gesamtAZ   = auszahlungen?.reduce((s,a) => s + parseFloat(a.netto||0), 0) || 0;
    const verifZerts = zertifikate.filter(z => z.status === 'verified').length;

    setHTML('profil-stats', `
      <div class="metric"><div class="metric-label">Aktive Zusagen</div><div class="metric-val">${aktiv}</div></div>
      <div class="metric"><div class="metric-label">Geliefert</div><div class="metric-val green">${geliefert}</div></div>
      <div class="metric"><div class="metric-label">Gesamt ausgezahlt</div><div class="metric-val green">${fmt(gesamtAZ)} €</div></div>
      <div class="metric"><div class="metric-label">Zertifikate</div><div class="metric-val ${verifZerts>0?'green':'amber'}">${verifZerts}</div></div>
    `);

    // Account-Info
    setHTML('account-info', `
      <div style="display:grid;grid-template-columns:auto 1fr;gap:.25rem 1rem">
        <span style="color:var(--text3)">E-Mail</span><span>${window.Auth.getUser()?.email || '—'}</span>
        <span style="color:var(--text3)">Rolle</span><span>Erzeuger:in</span>
        <span style="color:var(--text3)">Betrieb-ID</span><span style="font-family:'DM Mono',monospace;font-size:11px">${erzeuger.id?.slice(0,8)}...</span>
        <span style="color:var(--text3)">Erzeuger seit</span><span>${new Date(erzeuger.created_at||Date.now()).toLocaleDateString('de-DE')}</span>
      </div>
    `);

    // Zertifikate
    setHTML('zert-list', zertifikate.length ? zertifikate.map(z => `
      <div class="auszahl-row">
        <div>
          <div style="font-size:13px;font-weight:500">${z.typ}
            <span class="pool-meta" style="margin-left:.5rem">${z.zert_nummer}</span>
          </div>
          <div class="pool-meta">Gültig bis: ${z.gueltig_bis?.split('T')[0] || 'unbegrenzt'}</div>
          <div class="pool-meta">Eingereicht: ${new Date(z.created_at).toLocaleDateString('de-DE')}</div>
          ${z.chain_tx ? chainInfo(z.chain_tx) : ''}
        </div>
        <div style="text-align:right">
          ${statusBadge(z.status)}
          ${z.geprueft_am ? `<div class="pool-meta" style="margin-top:4px">Geprüft: ${new Date(z.geprueft_am).toLocaleDateString('de-DE')}</div>` : ''}
        </div>
      </div>
    `).join('') : '<p style="color:var(--text3);font-size:13px">Noch keine Zertifikate eingereicht</p>');

  } catch (err) { showAlert('alerts', 'error', err.message); }
}

document.getElementById('btn-save-profil')?.addEventListener('click', async () => {
  const btn = document.getElementById('btn-save-profil');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Speichern...';
  try {
    await api.updateErzeuger({
      betrieb_name:    document.getElementById('p-name').value.trim(),
      region:          document.getElementById('p-region').value,
      adresse:         document.getElementById('p-adresse').value.trim() || null,
      plz:             document.getElementById('p-plz').value.trim() || null,
      ort:             document.getElementById('p-ort').value.trim() || null,
      telefon:         document.getElementById('p-telefon').value.trim() || null,
      website:         document.getElementById('p-website').value.trim() || null,
      beschreibung:    document.getElementById('p-beschreibung').value.trim() || null,
      sortiment:       document.getElementById('p-sortiment').value.trim() || null,
      max_kapazitaet:  parseFloat(document.getElementById('p-kapazitaet').value) || null,
      betriebsgroesse: document.getElementById('p-groesse').value,
      gruendungsjahr:  parseInt(document.getElementById('p-gruendung').value) || null,
      iban:            document.getElementById('p-iban').value.trim() || null,
      bank_name:       document.getElementById('p-bank').value.trim() || null,
      ust_id:          document.getElementById('p-ustid').value.trim() || null,
    });
    setHTML('profil-result', '<div class="alert alert-success">✓ Profil gespeichert</div>');
    btn.textContent = 'Profil speichern'; btn.disabled = false;
    setTimeout(() => setHTML('profil-result', ''), 3000);
  } catch (err) {
    btn.textContent = 'Profil speichern'; btn.disabled = false;
    showAlert('alerts', 'error', err.message);
  }
});

// Passwort ändern
document.getElementById('btn-change-pw')?.addEventListener('click', async () => {
  const current = document.getElementById('pw-current').value;
  const neu     = document.getElementById('pw-new').value;
  const neu2    = document.getElementById('pw-new2').value;
  const btn     = document.getElementById('btn-change-pw');
  if (!current || !neu) return setHTML('pw-result', '<div class="alert alert-error">Alle Felder ausfüllen</div>');
  if (neu !== neu2)    return setHTML('pw-result', '<div class="alert alert-error">Passwörter stimmen nicht überein</div>');
  if (neu.length < 8)  return setHTML('pw-result', '<div class="alert alert-error">Min. 8 Zeichen</div>');
  btn.disabled = true;
  try {
    await api.changePassword(current, neu);
    setHTML('pw-result', '<div class="alert alert-success">✓ Passwort geändert</div>');
    document.getElementById('pw-current').value = '';
    document.getElementById('pw-new').value     = '';
    document.getElementById('pw-new2').value    = '';
  } catch (err) {
    setHTML('pw-result', '<div class="alert alert-error">' + err.message + '</div>');
  }
  btn.disabled = false;
});

document.getElementById('btn-zert')?.addEventListener('click', async () => {
  const typ    = document.getElementById('z-typ').value;
  const nr     = document.getElementById('z-nr').value.trim();
  const datum  = document.getElementById('z-datum').value;
  const btn    = document.getElementById('btn-zert');
  if (!nr) return showAlert('alerts', 'error', 'Zertifikat-Nummer eingeben');
  btn.disabled = true;
  try {
    await api.addZertifikat({ typ, zert_nummer: nr, gueltig_bis: datum || null });
    setHTML('zert-result', '<div class="alert alert-success">Eingereicht · Prüfung ausstehend</div>');
    document.getElementById('z-nr').value = '';
    btn.disabled = false;
    loadProfil();
  } catch (err) {
    btn.disabled = false;
    showAlert('alerts', 'error', err.message);
  }
});

// Commitment zurückziehen
document.getElementById('commitments-list')?.addEventListener('click', async e => {
  const btn = e.target.closest('[data-action="withdraw"]');
  if (!btn) return;
  if (!confirm('Commitment zurückziehen? Du kannst danach wieder zusagen solange der Pool offen ist.')) return;
  try {
    await api.withdrawCommit(btn.dataset.poolId);
    toast('Commitment zurückgezogen');
    loadPools();
  } catch (err) { showAlert('alerts','error',err.message); }
});

// ── INIT ──────────────────────────────────────────────────────
loadPools();
</script>
</body>
</html>
