<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LieferPool – Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="hdr" id="app-header"></header>
  <main class="main">
    <div id="alerts"></div>

    <!-- VIEW: Übersicht -->
    <div id="view-overview" class="view">
      <div class="grid4" style="margin-bottom:1rem" id="sys-metrics"></div>
      <div class="grid2">
        <div class="card">
          <div class="card-title">Aktive Pools</div>
          <div id="admin-pools-list"><div class="spinner"></div></div>
        </div>
        <div class="card">
          <div class="card-title">Ausstehende Zertifikate</div>
          <div id="pending-quick"></div>
        </div>
      </div>
    </div>

    <!-- VIEW: Zertifikate -->
    <div id="view-zertifikate" class="view" style="display:none">
      <div class="card">
        <div class="section-hdr">
          <span class="section-title">Zertifikatsprüfung</span>
          <button class="btn btn-sm" id="btn-reload-zerts">↻ Aktualisieren</button>
        </div>
        <div id="zert-admin-list"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- VIEW: Erzeuger -->
    <div id="view-erzeuger" class="view" style="display:none">
      <div class="card">
        <div class="section-hdr">
          <span class="section-title">Registrierte Erzeuger</span>
          <input class="form-control" id="erzeuger-search" placeholder="Suchen..." style="width:200px;padding:5px 10px">
        </div>
        <div id="erzeuger-admin-list"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- VIEW: Lieferung anlegen -->
    <div id="view-lieferung-neu" class="view" style="display:none">
      <div class="card" style="max-width:560px">
        <div class="card-title">Lieferschein erstellen</div>
        <div id="lief-create-result"></div>
        <div id="lief-create-form">
          <div class="form-group">
            <label class="form-label">Pool</label>
            <select class="form-control" id="lief-pool-sel"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Lieferdatum</label>
            <input class="form-control" type="date" id="lief-datum">
          </div>
          <button class="btn btn-primary" id="btn-create-lief">Lieferschein erstellen</button>
        </div>
      </div>
    </div>

    <!-- VIEW: Lager (Hub Modul) -->
    <div id="view-lager" class="view" style="display:none">

      <div class="card">
        <div class="section-hdr">
          <span class="section-title">Lagerbestand</span>
          <div style="display:flex;gap:.5rem">
            <button class="btn btn-sm" id="btn-reload-lager">↻ Aktualisieren</button>
            <button class="btn btn-primary btn-sm" id="btn-show-eingang-form">+ Eingang buchen</button>
          </div>
        </div>
        <div id="lager-alerts" style="margin-bottom:1rem"></div>
        <div id="lager-list"><div class="spinner"></div></div>
      </div>

      <div class="card" id="eingang-form-card" style="display:none">
        <div class="card-title">Manuellen Wareneingang buchen</div>
        <div id="eingang-result"></div>
        <div id="eingang-form">
          <div class="grid2">
            <div class="form-group">
              <label class="form-label">Produkt</label>
              <input class="form-control" id="eg-produkt" placeholder="z.B. Karotten Bio">
            </div>
            <div class="form-group">
              <label class="form-label">Menge (kg)</label>
              <input class="form-control" type="number" id="eg-menge" min="0.1" step="0.1" placeholder="z.B. 250">
            </div>
          </div>
          <div class="grid2">
            <div class="form-group">
              <label class="form-label">Qualität</label>
              <select class="form-control" id="eg-qualitaet">
                <option value="A">A – Einwandfrei</option>
                <option value="B">B – Gut</option>
                <option value="C">C – Ausreichend</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Notiz</label>
              <input class="form-control" id="eg-notiz" placeholder="optional">
            </div>
          </div>
          <div style="display:flex;gap:.5rem">
            <button class="btn btn-primary" id="btn-eingang-submit">Buchen</button>
            <button class="btn" id="btn-eingang-cancel">Abbrechen</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Bedarfsabgleich – Lager vs. Wochenbedarf</div>
        <div id="bedarf-abgleich"><div class="spinner"></div></div>
      </div>

      <div class="card">
        <div class="section-hdr">
          <span class="section-title">Letzte Lagerbewegungen</span>
          <select class="form-control" id="filter-bewegung-typ" style="width:140px;padding:5px 8px">
            <option value="">Alle</option>
            <option value="eingang">Eingänge</option>
            <option value="ausgang">Ausgänge</option>
            <option value="korrektur">Korrekturen</option>
          </select>
        </div>
        <div id="bewegungen-list"><div class="spinner"></div></div>
      </div>

    </div>

  </main>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
const user = requireAuth('admin');
if (!user) throw 'not auth';

const NAV = [
  { id: 'overview',      label: 'Übersicht' },
  { id: 'zertifikate',   label: 'Zertifikate' },
  { id: 'erzeuger',      label: 'Erzeuger' },
  { id: 'lieferung-neu', label: 'Lieferschein' },
  { id: 'lager',         label: 'Lager' },
];

renderHeader('overview', NAV, (v) => {
  showView(v);
  loadView(v);
});

async function loadView(v) {
  if (v === 'overview')      loadOverview();
  if (v === 'zertifikate')   loadZertifikate();
  if (v === 'erzeuger')      loadErzeuger();
  if (v === 'lieferung-neu') loadLieferungNeu();
  if (v === 'lager')         loadLager();
}

// ── ÜBERSICHT ─────────────────────────────────────────────────────
async function loadOverview() {
  try {
    const [poolsRes, erzeugerRes, certsRes] = await Promise.all([
      api.getPools(),
      api.getAllErzeuger(),
      api.getPendingZertifikate(),
    ]);

    const { pools }                = poolsRes;
    const { erzeuger }             = erzeugerRes;
    const { zertifikate: pending } = certsRes;

    const offene  = pools.filter(p => p.status === 'offen').length;
    const gelief  = pools.filter(p => p.status === 'geliefert').length;
    const volumen = pools.reduce((s, p) => s + parseFloat(p.menge_committed || 0), 0);

    document.getElementById('sys-metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Erzeuger</div>
        <div class="metric-val green">${erzeuger.length}</div></div>
      <div class="metric"><div class="metric-label">Offene Pools</div>
        <div class="metric-val">${offene}</div></div>
      <div class="metric"><div class="metric-label">Ausstehende Zerts</div>
        <div class="metric-val amber">${pending.length}</div></div>
      <div class="metric"><div class="metric-label">Gesamtvolumen (kg)</div>
        <div class="metric-val">${Math.round(volumen)}</div></div>
    `;

    document.getElementById('admin-pools-list').innerHTML = pools.length ? pools.map(p => `
      <div class="pool-item">
        <div class="pool-row">
          <span class="pool-name">${p.produkt}</span>
          ${statusBadge(p.status)}
        </div>
        <div class="pool-meta">${p.lieferwoche} · ${p.erzeuger_count || 0} Erzeuger</div>
        ${poolBar(p.menge_committed, p.menge_ziel)}
      </div>
    `).join('') : '<p style="color:var(--text3);font-size:13px">Keine Pools</p>';

    document.getElementById('pending-quick').innerHTML = pending.length ? pending.slice(0, 5).map(z => `
      <div class="pool-item">
        <div class="pool-row">
          <div>
            <div style="font-size:13px;font-weight:500">${z.betrieb_name}</div>
            <div class="pool-meta">${z.typ} · ${z.zert_nummer}</div>
          </div>
          <div style="display:flex;gap:.5rem">
            <button class="btn btn-primary btn-sm" onclick="approveZert('${z.id}')">✓</button>
            <button class="btn btn-sm btn-danger" onclick="rejectZert('${z.id}')">✗</button>
          </div>
        </div>
      </div>
    `).join('') : '<p style="color:var(--text3);font-size:13px">Keine ausstehenden Zertifikate</p>';

  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

// ── ZERTIFIKATE ───────────────────────────────────────────────────
async function loadZertifikate() {
  try {
    const { zertifikate } = await api.getPendingZertifikate();
    document.getElementById('zert-admin-list').innerHTML = zertifikate.length ? `
      <table class="tbl">
        <thead>
          <tr><th>Betrieb</th><th>Typ</th><th>Nummer</th><th>Gültig bis</th><th>Eingereicht</th><th>Aktion</th></tr>
        </thead>
        <tbody>${zertifikate.map(z => `
          <tr id="zrow-${z.id}">
            <td style="font-weight:500">${z.betrieb_name}
              <div style="font-size:11px;color:var(--text3)">${z.email}</div>
            </td>
            <td><span class="badge badge-gray">${z.typ}</span></td>
            <td class="pool-meta">${z.zert_nummer}</td>
            <td class="pool-meta">${z.gueltig_bis?.split('T')[0] || '—'}</td>
            <td class="pool-meta">${new Date(z.created_at).toLocaleDateString('de-DE')}</td>
            <td>
              <div style="display:flex;gap:.5rem">
                <button class="btn btn-primary btn-sm" onclick="approveZert('${z.id}')">Bestätigen</button>
                <button class="btn btn-sm btn-danger" onclick="rejectZert('${z.id}')">Ablehnen</button>
              </div>
            </td>
          </tr>
        `).join('')}</tbody>
      </table>
    ` : '<p style="color:var(--text3);font-size:13px">Keine ausstehenden Zertifikate – alles geprüft ✓</p>';
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

async function approveZert(id) {
  try {
    await api.setZertifikatStatus(id, 'verified');
    const row = document.getElementById('zrow-' + id);
    if (row) row.innerHTML = `<td colspan="6" style="color:var(--green);font-family:'DM Mono',monospace;font-size:12px">✓ Bestätigt</td>`;
    toast('Zertifikat bestätigt');
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

async function rejectZert(id) {
  if (!confirm('Zertifikat ablehnen?')) return;
  try {
    await api.setZertifikatStatus(id, 'rejected');
    const row = document.getElementById('zrow-' + id);
    if (row) row.innerHTML = `<td colspan="6" style="color:var(--red);font-family:'DM Mono',monospace;font-size:12px">✗ Abgelehnt</td>`;
    toast('Zertifikat abgelehnt', 'error');
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

document.getElementById('btn-reload-zerts')?.addEventListener('click', loadZertifikate);

// ── ERZEUGER ──────────────────────────────────────────────────────
let allErzeuger = [];

async function loadErzeuger() {
  try {
    const { erzeuger } = await api.getAllErzeuger();
    allErzeuger = erzeuger;
    renderErzeuger(erzeuger);
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

function renderErzeuger(list) {
  document.getElementById('erzeuger-admin-list').innerHTML = list.length ? `
    <table class="tbl">
      <thead>
        <tr><th>Betrieb</th><th>E-Mail</th><th>Region</th><th>Zertifikate</th><th>Commitments</th></tr>
      </thead>
      <tbody>${list.map(e => `
        <tr>
          <td style="font-weight:500">${e.betrieb_name}</td>
          <td class="pool-meta">${e.email}</td>
          <td class="pool-meta">${e.region}</td>
          <td>
            <span class="badge ${e.zert_count > 0 ? 'badge-green' : 'badge-amber'}">
              ${e.zert_count} verifiziert
            </span>
          </td>
          <td class="pool-meta">${e.commitment_count}</td>
        </tr>
      `).join('')}</tbody>
    </table>
  ` : '<p style="color:var(--text3);font-size:13px">Keine Erzeuger gefunden</p>';
}

document.getElementById('erzeuger-search')?.addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderErzeuger(allErzeuger.filter(e =>
    e.betrieb_name.toLowerCase().includes(q) || e.email.toLowerCase().includes(q)
  ));
});

// ── LIEFERSCHEIN ──────────────────────────────────────────────────
async function loadLieferungNeu() {
  try {
    const { pools } = await api.getPools({ status: 'geschlossen' });
    const sel = document.getElementById('lief-pool-sel');
    sel.innerHTML = pools.length
      ? pools.map(p => `<option value="${p.id}">${p.produkt} – ${p.lieferwoche} (${Math.round(p.menge_committed)} kg)</option>`).join('')
      : '<option>Keine geschlossenen Pools</option>';
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

document.getElementById('btn-create-lief')?.addEventListener('click', async () => {
  const pool_id     = document.getElementById('lief-pool-sel').value;
  const lieferdatum = document.getElementById('lief-datum').value;
  const btn         = document.getElementById('btn-create-lief');

  if (!pool_id) return showAlert('alerts', 'error', 'Pool auswählen');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Erstelle...';

  try {
    const { lieferung } = await api.createLieferung(pool_id, lieferdatum || null);
    document.getElementById('lief-create-result').innerHTML = `
      <div class="success-box">
        <div class="success-icon">✓</div>
        <div class="success-title">Lieferschein erstellt</div>
        <div class="success-sub">Nr: ${lieferung.lieferschein_nr}</div>
        <div style="margin-top:.75rem">
          <span class="qr-code">${lieferung.qr_code}</span>
        </div>
        <div class="success-sub" style="margin-top:.5rem">QR-Code für Fahrer</div>
      </div>
    `;
    document.getElementById('lief-create-form').style.display = 'none';
  } catch (err) {
    btn.textContent = 'Lieferschein erstellen';
    btn.disabled = false;
    showAlert('alerts', 'error', err.message);
  }
});

// ── LAGER (Hub Modul) ─────────────────────────────────────────────
async function loadLager() {
  loadLagerBestand();
  loadBedarfAbgleich();
  loadBewegungen();
}

async function loadLagerBestand() {
  try {
    const [{ lager }, { alerts }] = await Promise.all([
      api.getLager(),
      api.getLagerAlerts(),
    ]);

    const alertsEl = document.getElementById('lager-alerts');
    if (alerts.length > 0) {
      alertsEl.innerHTML = `
        <div class="alert alert-info">
          ⚠ ${alerts.length} Produkt${alerts.length > 1 ? 'e' : ''} unter Mindestbestand:
          ${alerts.map(a => `<strong>${a.produkt}</strong> (${fmt(a.bestand,1)} ${a.einheit})`).join(', ')}
        </div>`;
    } else {
      alertsEl.innerHTML = '';
    }

    document.getElementById('lager-list').innerHTML = lager.length ? `
      <table class="tbl">
        <thead>
          <tr>
            <th>Produkt</th>
            <th>Bestand</th>
            <th>Mindestbestand</th>
            <th>Eingang 7d</th>
            <th>Ausgang 7d</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${lager.map(l => `
            <tr>
              <td style="font-weight:500">${l.produkt}</td>
              <td style="font-family:'DM Mono',monospace">${fmt(l.bestand,1)} ${l.einheit}</td>
              <td style="font-family:'DM Mono',monospace;color:var(--text2)">${fmt(l.mindestbestand,1)} ${l.einheit}</td>
              <td style="color:var(--green);font-family:'DM Mono',monospace">+${fmt(l.eingang_7d,1)}</td>
              <td style="color:var(--amber);font-family:'DM Mono',monospace">-${fmt(l.ausgang_7d,1)}</td>
              <td>${l.unterbestand
                ? '<span class="badge badge-red">Unterbestand</span>'
                : '<span class="badge badge-green">OK</span>'}</td>
              <td>
                <button class="btn btn-sm"
                  onclick="setMindestbestand('${l.id}','${l.produkt}',${l.mindestbestand})">
                  Min. setzen
                </button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : '<p style="color:var(--text3);font-size:13px">Noch keine Lagereinträge. Wareneingänge werden automatisch beim Bestätigen einer Lieferung gebucht.</p>';
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

async function loadBedarfAbgleich() {
  try {
    const { aggregiert } = await api.getBedarfAggregiert();
    document.getElementById('bedarf-abgleich').innerHTML = aggregiert.length ? `
      <table class="tbl">
        <thead>
          <tr>
            <th>Produkt</th>
            <th>Wochenbedarf</th>
            <th>Aktueller Bestand</th>
            <th>Reichweite</th>
            <th>Abnehmer</th>
          </tr>
        </thead>
        <tbody>
          ${aggregiert.map(r => `
            <tr>
              <td style="font-weight:500">${r.produkt}</td>
              <td style="font-family:'DM Mono',monospace">${fmt(r.gesamt_pro_woche,1)} ${r.einheit}</td>
              <td style="font-family:'DM Mono',monospace">
                ${r.bestand_aktuell != null ? fmt(r.bestand_aktuell,1) + ' ' + r.einheit : '—'}
              </td>
              <td>
                ${r.deckung_tage != null
                  ? `<span class="badge ${r.deckung_tage < 3 ? 'badge-red' : r.deckung_tage < 7 ? 'badge-amber' : 'badge-green'}">
                      ${r.deckung_tage} Tage
                    </span>`
                  : '<span class="badge badge-gray">—</span>'}
              </td>
              <td class="pool-meta">${r.caterer_anzahl}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : '<p style="color:var(--text3);font-size:13px">Keine Bedarfsprognosen erfasst. Caterer können unter "Bedarfsprognose" ihren Wochenbedarf eintragen.</p>';
  } catch (err) {
    document.getElementById('bedarf-abgleich').innerHTML =
      '<p style="color:var(--text3);font-size:13px">Keine Daten</p>';
  }
}

async function loadBewegungen() {
  try {
    const typ = document.getElementById('filter-bewegung-typ')?.value;
    const { bewegungen } = await api.getLagerBewegungen({ typ, limit: 30 });

    document.getElementById('bewegungen-list').innerHTML = bewegungen.length ? `
      <table class="tbl">
        <thead>
          <tr><th>Zeit</th><th>Produkt</th><th>Typ</th><th>Menge</th><th>Bestand danach</th><th>Notiz</th></tr>
        </thead>
        <tbody>
          ${bewegungen.map(m => `
            <tr>
              <td class="pool-meta">${new Date(m.created_at).toLocaleString('de-DE', { dateStyle:'short', timeStyle:'short' })}</td>
              <td style="font-weight:500">${m.produkt}</td>
              <td>${m.typ === 'eingang'
                    ? '<span class="badge badge-green">Eingang</span>'
                    : m.typ === 'ausgang'
                    ? '<span class="badge badge-amber">Ausgang</span>'
                    : '<span class="badge badge-gray">Korrektur</span>'}</td>
              <td style="font-family:'DM Mono',monospace;${m.typ==='eingang'?'color:var(--green)':m.typ==='ausgang'?'color:var(--amber)':''}">
                ${m.typ==='eingang'?'+':m.typ==='ausgang'?'-':''}${fmt(Math.abs(m.menge),1)} ${m.einheit}
              </td>
              <td class="pool-meta">${m.bestand_nach != null ? fmt(m.bestand_nach,1)+' '+m.einheit : '—'}</td>
              <td class="pool-meta" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${m.notiz || '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : '<p style="color:var(--text3);font-size:13px">Keine Bewegungen</p>';
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

async function setMindestbestand(id, produkt, aktuell) {
  const neu = prompt(`Mindestbestand für "${produkt}" (aktuell: ${aktuell} kg):`, aktuell);
  if (neu == null || isNaN(parseFloat(neu))) return;
  try {
    await api.setMindestbestand(id, parseFloat(neu));
    toast(`Mindestbestand für ${produkt} gesetzt`);
    loadLagerBestand();
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

document.getElementById('btn-show-eingang-form')?.addEventListener('click', () => {
  document.getElementById('eingang-form-card').style.display = 'block';
  document.getElementById('eingang-form-card').scrollIntoView({ behavior: 'smooth' });
});

document.getElementById('btn-eingang-cancel')?.addEventListener('click', () => {
  document.getElementById('eingang-form-card').style.display = 'none';
});

document.getElementById('btn-eingang-submit')?.addEventListener('click', async () => {
  const produkt   = document.getElementById('eg-produkt').value.trim();
  const menge     = parseFloat(document.getElementById('eg-menge').value);
  const qualitaet = document.getElementById('eg-qualitaet').value;
  const notiz     = document.getElementById('eg-notiz').value.trim();
  const btn       = document.getElementById('btn-eingang-submit');

  if (!produkt || !menge) return showAlert('alerts', 'error', 'Produkt und Menge erforderlich');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const res = await api.lagerEingang({ produkt, menge, qualitaet, notiz });
    document.getElementById('eingang-result').innerHTML = `
      <div class="alert alert-success">
        ✓ ${menge} kg ${produkt} eingebucht · Bestand jetzt: ${fmt(res.bestand_aktuell,1)} kg
      </div>`;
    document.getElementById('eg-produkt').value = '';
    document.getElementById('eg-menge').value   = '';
    document.getElementById('eg-notiz').value   = '';
    btn.textContent = 'Buchen';
    btn.disabled = false;
    loadLagerBestand();
    loadBewegungen();
  } catch (err) {
    btn.textContent = 'Buchen';
    btn.disabled = false;
    showAlert('alerts', 'error', err.message);
  }
});

document.getElementById('filter-bewegung-typ')?.addEventListener('change', loadBewegungen);
document.getElementById('btn-reload-lager')?.addEventListener('click', loadLager);

// ── INIT ──────────────────────────────────────────────────────────
loadOverview();
</script>
</body>
</html>
