<!-- ============================================================
  CATERER.HTML – HUB ERWEITERUNG: Bedarfsprognose
  
  1. NAV ergänzen: { id: 'bedarf-prognose', label: 'Bedarfsprognose' }
  2. Diesen View-Block einfügen
  3. loadView() ergänzen: if (v === 'bedarf-prognose') loadBedarfPrognose();
  ============================================================ -->

<!-- VIEW: Bedarfsprognose -->
<div id="view-bedarf-prognose" class="view" style="display:none">

  <!-- Bestehende Prognosen -->
  <div class="card">
    <div class="section-hdr">
      <span class="section-title">Meine Bedarfsprognosen</span>
      <button class="btn btn-primary btn-sm" id="btn-show-prognose-form">+ Neue Prognose</button>
    </div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:1rem;line-height:1.6">
      Teile dem Food Hub mit, wie viel du wöchentlich von welchem Produkt benötigst.
      Das hilft bei der Planung und Pool-Erstellung.
    </p>
    <div id="prognosen-list"><div class="spinner"></div></div>
  </div>

  <!-- Neue Prognose anlegen -->
  <div class="card" id="prognose-form-card" style="display:none">
    <div class="card-title">Neue Bedarfsprognose</div>
    <div id="prognose-result"></div>
    <div id="prognose-form">
      <div class="grid2">
        <div class="form-group">
          <label class="form-label">Produkt</label>
          <select class="form-control" id="bp-produkt">
            <option>Bio-Gemüse Mix</option>
            <option>Karotten Bio</option>
            <option>Kohlrabi Bio</option>
            <option>Spinat frisch</option>
            <option>Tomaten Bio</option>
            <option>Kartoffeln</option>
            <option>Paprika Bio</option>
            <option>Zucchini Bio</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Menge pro Woche (kg)</label>
          <input class="form-control" type="number" id="bp-menge" min="1" placeholder="z.B. 80">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Gewünschte Liefertage</label>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem">
          ${['Montag','Dienstag','Mittwoch','Donnerstag','Freitag'].map(t => `
            <label style="display:flex;align-items:center;gap:.35rem;font-size:13px;cursor:pointer">
              <input type="checkbox" class="liefertag-cb" value="${t}"> ${t}
            </label>
          `).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notiz (optional)</label>
        <input class="form-control" id="bp-notiz" placeholder="z.B. Schnittgemüse bevorzugt, keine Erdbeeren">
      </div>

      <!-- Kostenvorschau -->
      <div id="bp-vorschau" class="erloes-box" style="display:none"></div>

      <div style="display:flex;gap:.5rem">
        <button class="btn btn-primary" id="btn-prognose-submit">Prognose speichern</button>
        <button class="btn" id="btn-prognose-cancel">Abbrechen</button>
      </div>
    </div>
  </div>

</div>

<!-- ============================================================
  JAVASCRIPT – in den <script>-Block von caterer.html einfügen
  ============================================================ -->
<script>
// ---- NAV ergänzen ----
// NAV.push({ id: 'bedarf-prognose', label: 'Bedarfsprognose' });

async function loadBedarfPrognose() {
  try {
    const { prognosen } = await api.getBedarfPrognosen();

    document.getElementById('prognosen-list').innerHTML = prognosen.length ? `
      <table class="tbl">
        <thead>
          <tr>
            <th>Produkt</th>
            <th>Wochenbedarf</th>
            <th>Liefertage</th>
            <th>Jahresbedarf</th>
            <th>Notiz</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${prognosen.map(p => `
            <tr id="prow-${p.id}">
              <td style="font-weight:500">${p.produkt}</td>
              <td style="font-family:'DM Mono',monospace">${fmt(p.menge_pro_woche, 0)} kg</td>
              <td class="pool-meta">${p.liefertage?.join(', ') || '—'}</td>
              <td class="pool-meta">${fmt(p.menge_pro_woche * 52, 0)} kg</td>
              <td class="pool-meta" style="max-width:160px;overflow:hidden;text-overflow:ellipsis">
                ${p.notiz || '—'}
              </td>
              <td>
                <button class="btn btn-sm btn-danger"
                        onclick="deletePrognose('${p.id}', '${p.produkt}')">Entfernen</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div style="margin-top:1rem;padding:1rem;background:var(--bg3);border-radius:4px">
        <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem">Gesamtbedarf/Woche</div>
        <div style="font-size:20px;font-weight:300;color:var(--green)">
          ${fmt(prognosen.reduce((s, p) => s + parseFloat(p.menge_pro_woche), 0), 0)} kg
        </div>
      </div>
    ` : `
      <div style="text-align:center;padding:2rem;color:var(--text3)">
        <div style="font-size:2rem;margin-bottom:.75rem">📋</div>
        <div style="font-size:14px;margin-bottom:.5rem">Noch keine Bedarfsprognosen</div>
        <div style="font-size:12px">Füge deine wöchentlichen Bedarfe hinzu, damit der Food Hub gezielt planen kann.</div>
      </div>
    `;
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

async function deletePrognose(id, produkt) {
  if (!confirm(`Prognose für "${produkt}" entfernen?`)) return;
  try {
    await api.deleteBedarfPrognose(id);
    const row = document.getElementById('prow-' + id);
    if (row) row.style.opacity = '0.3';
    toast('Prognose entfernt');
    loadBedarfPrognose();
  } catch (err) {
    showAlert('alerts', 'error', err.message);
  }
}

// Formular
document.getElementById('btn-show-prognose-form')?.addEventListener('click', () => {
  document.getElementById('prognose-form-card').style.display = 'block';
  document.getElementById('prognose-form-card').scrollIntoView({ behavior: 'smooth' });
});

document.getElementById('btn-prognose-cancel')?.addEventListener('click', () => {
  document.getElementById('prognose-form-card').style.display = 'none';
});

// Vorschau aktualisieren
function updateBedarfVorschau() {
  const menge = parseFloat(document.getElementById('bp-menge')?.value || 0);
  const box   = document.getElementById('bp-vorschau');
  if (menge > 0) {
    box.style.display = 'block';
    box.innerHTML = `
      <div class="erloes-row"><span class="lbl">Pro Woche</span><span>${fmt(menge, 0)} kg</span></div>
      <div class="erloes-row"><span class="lbl">Pro Monat</span><span>${fmt(menge * 4, 0)} kg</span></div>
      <div class="erloes-row"><span class="lbl">Pro Jahr</span><span class="erloes-total">${fmt(menge * 52, 0)} kg</span></div>
    `;
  } else {
    box.style.display = 'none';
  }
}

document.getElementById('bp-menge')?.addEventListener('input', updateBedarfVorschau);

document.getElementById('btn-prognose-submit')?.addEventListener('click', async () => {
  const produkt       = document.getElementById('bp-produkt').value;
  const menge         = parseFloat(document.getElementById('bp-menge').value);
  const notiz         = document.getElementById('bp-notiz').value.trim();
  const liefertage    = [...document.querySelectorAll('.liefertag-cb:checked')].map(cb => cb.value);
  const btn           = document.getElementById('btn-prognose-submit');

  if (!menge || menge <= 0) return showAlert('alerts', 'error', 'Menge eingeben');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Speichere...';

  try {
    await api.createBedarfPrognose({ produkt, menge_pro_woche: menge, liefertage, notiz });
    document.getElementById('prognose-result').innerHTML =
      `<div class="alert alert-success">✓ Prognose für ${produkt} gespeichert</div>`;
    document.getElementById('bp-menge').value = '';
    document.getElementById('bp-notiz').value = '';
    document.querySelectorAll('.liefertag-cb').forEach(cb => cb.checked = false);
    updateBedarfVorschau();
    btn.textContent = 'Prognose speichern';
    btn.disabled = false;
    loadBedarfPrognose();
  } catch (err) {
    btn.textContent = 'Prognose speichern';
    btn.disabled = false;
    showAlert('alerts', 'error', err.message);
  }
});
</script>
